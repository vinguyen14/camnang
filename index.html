<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trainer Hub | Quản trị Đào tạo</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f4f7f9; color: #0f172a; overflow: hidden; }
        .glass-panel { background: rgba(255, 255, 255, 0.9); backdrop-blur: 12px; border-right: 1px solid #e2e8f0; }
        .custom-scrollbar::-webkit-scrollbar { height: 6px; width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .menu-item { transition: all 0.2s ease; border-radius: 12px; margin-bottom: 4px; border: 1px solid transparent; }
        .menu-item.active { background-color: #eff6ff; color: #2563eb; font-weight: 700; border-color: #dbeafe; }
        .modal { display: none; opacity: 0; transition: opacity 0.3s ease; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.7); backdrop-blur: 8px; align-items: center; justify-content: center; z-index: 9999; }
        .modal.active { display: flex; opacity: 1; }
        .modal-content { transform: scale(0.9); transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .modal.active .modal-content { transform: scale(1); }
    </style>
</head>
<body class="flex h-screen antialiased">
    <!-- SIDEBAR -->
    <aside class="w-60 glass-panel flex flex-col flex-shrink-0 z-20 shadow-lg">
        <div class="h-16 flex items-center px-6 mb-4">
            <i class="fas fa-layer-group text-blue-600 mr-3 text-xl"></i>
            <span class="font-black text-slate-800 tracking-tighter text-lg">Trainer Hub</span>
        </div>
        <nav class="flex-1 px-3 space-y-1" id="sidebar-menu">
            <a href="#dashboard" class="menu-item active flex items-center px-4 py-3 text-[13px] font-semibold text-slate-500"><i class="fas fa-border-all w-7"></i> Dashboard</a>
            <a href="#courses" class="menu-item flex items-center px-4 py-3 text-[13px] font-semibold text-slate-500"><i class="fas fa-book-open w-7"></i> Khóa Học</a>
            <a href="#analytics" class="menu-item flex items-center px-4 py-3 text-[13px] font-semibold text-slate-500"><i class="fas fa-chart-bar w-7"></i> Analytics</a>
            <a href="#tools" class="menu-item flex items-center px-4 py-3 text-[13px] font-semibold text-slate-500"><i class="fas fa-wrench w-7"></i> Công Cụ</a>
            <a href="#calendar" class="menu-item flex items-center px-4 py-3 text-[13px] font-semibold text-slate-500"><i class="far fa-calendar-alt w-7"></i> Lịch Năm</a>
        </nav>
        <div class="p-4 border-t border-slate-100 flex items-center gap-3 bg-slate-50/50">
            <div class="w-9 h-9 rounded-full bg-blue-600 text-white flex items-center justify-center font-bold shadow-md">V</div>
            <div class="text-[11px] leading-tight"><p class="font-bold text-slate-800">Nhật Vi - L&D</p><p class="text-slate-400">vi.nln@kiotviet.com</p></div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col relative overflow-hidden">
        <!-- SLIM HEADER -->
        <header class="h-14 flex items-center justify-end px-8 bg-white/60 border-b border-slate-200/60 backdrop-blur-md">
            <button class="w-8 h-8 rounded-full bg-white border border-slate-200 text-slate-400 hover:text-blue-500 transition relative">
                <i class="fas fa-bell text-xs"></i>
                <span class="absolute top-0 right-0 w-2 h-2 bg-rose-500 rounded-full"></span>
            </button>
        </header>

        <!-- APP CONTAINER -->
        <div id="app-root" class="flex-1 overflow-y-auto custom-scrollbar px-10 py-8 transition-all duration-300"></div>
    </main>

    <!-- SUCCESS MODAL -->
    <div id="successModal" class="modal">
        <div class="modal-content bg-white p-10 rounded-[40px] shadow-2xl text-center max-w-sm w-full relative border border-white">
            <button onclick="closeModal('successModal')" class="absolute top-6 right-6 text-slate-300 hover:text-slate-500"><i class="fas fa-times"></i></button>
            <div class="w-20 h-20 bg-emerald-50 text-emerald-500 rounded-full flex items-center justify-center mx-auto mb-6 text-4xl shadow-inner"><i class="fas fa-check-circle"></i></div>
            <h3 class="text-2xl font-black text-slate-800 mb-2">Đã nộp báo cáo!</h3>
            <p class="text-sm text-slate-500 mb-8">Hệ thống đã cập nhật số liệu của bạn vào bảng Analytics chi tiết.</p>
            <a href="#analytics" onclick="closeModal('successModal')" class="block w-full py-4 bg-slate-900 text-white rounded-2xl font-bold shadow-lg hover:bg-blue-600 transition">Xem kết quả chi tiết</a>
        </div>
    </div>

    <!-- AUTH MODAL -->
    <div id="authModal" class="modal">
        <div class="modal-content bg-white p-10 rounded-[40px] shadow-2xl text-center max-w-sm w-full relative border border-white">
            <div class="w-16 h-16 bg-rose-50 text-rose-500 rounded-full flex items-center justify-center mx-auto mb-5 text-2xl shadow-inner"><i class="fas fa-shield-alt"></i></div>
            <h3 class="text-xl font-black text-slate-800 mb-2">Xác thực Bảo mật</h3>
            <p class="text-xs text-slate-500 mb-8">Vui lòng nhập mã PIN để thực hiện lệnh xóa.</p>
            <input type="password" id="authPassword" onkeypress="if(event.key==='Enter') executeDelete()" placeholder="••••••" class="w-full text-center border-2 border-slate-100 bg-slate-50 rounded-2xl p-4 font-mono text-3xl tracking-[0.5em] focus:border-rose-400 outline-none mb-8">
            <button onclick="executeDelete()" class="w-full py-4 bg-rose-500 text-white rounded-2xl font-bold uppercase tracking-widest shadow-lg hover:bg-rose-600 transition">Thực thi Xóa</button>
        </div>
    </div>

    <script>
        // GLOBAL APP STATE
        window.AppState = { 
            pagination: { page: 1, limit: 10 },
            filters: { search: '' },
            courseConfig: [
                { id: 'SPCB', prefix: '26KV', color: 'blue', label: 'RETAIL', title: 'Sản phẩm Cơ bản' },
                { id: 'KV1', prefix: 'KV1-26', color: 'indigo', label: 'ADVANCED', title: 'Sản phẩm KV1' },
                { id: 'TAX', prefix: 'INV-26', color: 'slate', label: 'SPECIALIST', title: 'HĐĐT - Thuế - Kế toán' },
                { id: 'FNB', prefix: 'FNB-26', color: 'orange', label: 'INDUSTRY', title: 'KiotViet FNB' },
                { id: 'SALON', prefix: 'SL-26', color: 'fuchsia', label: 'INDUSTRY', title: 'KiotViet Salon' },
                { id: 'HOTEL', prefix: 'HL-26', color: 'emerald', label: 'INDUSTRY', title: 'KiotViet Hotel' }
            ]
        };

        window.loadMasterDB = () => JSON.parse(localStorage.getItem('kv_master_db') || '[]');
        window.openModal = id => document.getElementById(id).classList.add('active');
        window.closeModal = id => document.getElementById(id).classList.remove('active');

        async function router() {
            let hash = location.hash.slice(1) || 'dashboard';
            let routeKey = hash;
            if(hash.startsWith('course-') || hash.startsWith('tasks-')) {
                const [type, id] = hash.split('-');
                localStorage.setItem('currentCourseId', id.toUpperCase());
                routeKey = type === 'course' ? 'course-detail' : 'tasks';
            }
            const routes = { 'dashboard':'views/dashboard.html', 'courses':'views/courses.html', 'analytics':'views/analytics.html', 'tools':'views/tools.html', 'calendar':'views/calendar.html', 'course-detail':'views/course-detail.html', 'tasks':'views/tasks.html' };
            const app = document.getElementById('app-root');
            try {
                const res = await fetch(`${routes[routeKey]}?v=${Date.now()}`);
                const html = await res.text();
                app.innerHTML = html;
                app.querySelectorAll('script').forEach(s => { const newS = document.createElement('script'); newS.text = s.text; s.parentNode.replaceChild(newS, s); });
            } catch (e) { app.innerHTML = `<div class="p-20 text-center">Lỗi tải trang.</div>`; }
            document.querySelectorAll('.menu-item').forEach(el => el.classList.toggle('active', el.getAttribute('href') === `#${routeKey}`));
        }

        window.deleteTargetIdx = null;
        window.requestDelete = idx => { window.deleteTargetIdx = idx; document.getElementById('authPassword').value=''; openModal('authModal'); setTimeout(()=>document.getElementById('authPassword').focus(), 100); };
        window.executeDelete = () => {
            if (document.getElementById('authPassword').value !== "014023") return alert("Sai mã PIN!");
            if (confirm("Hành động này không thể hoàn tác. Tiếp tục?")) {
                let db = window.loadMasterDB();
                if (window.deleteTargetIdx === -1) db = []; else db.splice(window.deleteTargetIdx, 1);
                localStorage.setItem('kv_master_db', JSON.stringify(db));
                closeModal('authModal');
                if(typeof renderAnalytics === 'function') renderAnalytics();
            }
        };

        window.addEventListener('hashchange', router); window.addEventListener('DOMContentLoaded', router);
    </script>
</body>
</html>
