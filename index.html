<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trainer Hub | Quản trị Đào tạo</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: #1e293b; overflow: hidden; }
        .glass-panel { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border-right: 1px solid #f1f5f9; }
        .custom-scrollbar::-webkit-scrollbar { height: 6px; width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        .menu-item { transition: all 0.2s ease; border-radius: 12px; margin-bottom: 4px; border: 1px solid transparent; }
        .menu-item.active { background-color: #eff6ff; color: #2563eb; font-weight: 700; border-color: #dbeafe; }
        #app-root { transition: opacity 0.2s ease, transform 0.2s ease; }
        #app-root.fade-out { opacity: 0; transform: translateY(10px); }
        .modal { display: none; opacity: 0; transition: opacity 0.3s ease; }
        .modal.active { display: flex; opacity: 1; }
        .modal .modal-content { transform: scale(0.9); transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .modal.active .modal-content { transform: scale(1); }
        /* Background Orbs */
        .orb { position: absolute; border-radius: 50%; filter: blur(100px); opacity: 0.15; z-index: -1; pointer-events: none; }
    </style>
</head>
<body class="flex h-screen antialiased relative">
    <div class="orb w-96 h-96 bg-blue-400 top-[-10%] left-[-10%]"></div>
    <div class="orb w-80 h-80 bg-emerald-400 bottom-[-10%] right-[-5%]"></div>

    <!-- SIDEBAR -->
    <aside class="w-64 glass-panel flex flex-col flex-shrink-0 z-20 shadow-xl">
        <div class="h-16 flex items-center px-6"><i class="fas fa-layer-group text-blue-500 mr-3 text-xl"></i><span class="font-black text-slate-800">Trainer Hub</span></div>
        <nav class="flex-1 py-4 px-3 space-y-1" id="sidebar-menu">
            <a href="#dashboard" class="menu-item active flex items-center px-4 py-2.5 text-[13px] font-semibold text-slate-500"><i class="fas fa-border-all w-7"></i> Dashboard</a>
            <a href="#courses" class="menu-item flex items-center px-4 py-2.5 text-[13px] font-semibold text-slate-500"><i class="fas fa-book-open w-7"></i> Khóa Học</a>
            <a href="#analytics" class="menu-item flex items-center px-4 py-2.5 text-[13px] font-semibold text-slate-500"><i class="fas fa-chart-bar w-7"></i> Analytics</a>
            <a href="#tools" class="menu-item flex items-center px-4 py-2.5 text-[13px] font-semibold text-slate-500"><i class="fas fa-wrench w-7"></i> Công Cụ</a>
            <a href="#calendar" class="menu-item flex items-center px-4 py-2.5 text-[13px] font-semibold text-slate-500"><i class="far fa-calendar-alt w-7"></i> Lịch Năm</a>
        </nav>
        <div class="p-4 border-t border-slate-100 bg-slate-50/50 flex items-center gap-3">
            <div class="w-8 h-8 rounded-full bg-blue-600 text-white flex items-center justify-center font-bold">V</div>
            <div class="text-[11px]"><p class="font-bold text-slate-800">Nhật Vi - L&D</p><p class="text-slate-400">vi.nln@kiotviet.com</p></div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col relative z-10 bg-transparent">
        <header class="h-14 flex items-center justify-between px-8 bg-white/50 border-b border-slate-100 backdrop-blur-md">
            <div id="header-title"></div>
            <div class="flex items-center gap-4 relative group">
                <button class="w-8 h-8 rounded-full bg-white border border-slate-200 text-slate-400 hover:text-blue-500 transition relative">
                    <i class="fas fa-bell text-xs"></i>
                    <span id="bell-badge" class="absolute top-0 right-0 w-2 h-2 bg-rose-500 border-2 border-white rounded-full hidden"></span>
                </button>
            </div>
        </header>
        <div id="app-root" class="flex-1 overflow-y-auto custom-scrollbar px-8 py-6 fade-in"></div>
    </main>

    <!-- MODAL AUTH (NHẬP PIN XÓA) -->
    <div id="authModal" class="modal fixed inset-0 bg-slate-900/60 backdrop-blur-sm items-center justify-center p-4 z-[9999]">
        <div class="modal-content bg-white w-full max-w-sm rounded-[32px] p-8 shadow-2xl text-center relative border border-white">
            <div class="w-16 h-16 bg-rose-50 text-rose-500 rounded-full flex items-center justify-center mx-auto mb-5 text-2xl border border-rose-100"><i class="fas fa-shield-alt"></i></div>
            <h3 class="text-xl font-black text-slate-800 mb-2">Xác thực Bảo mật</h3>
            <p class="text-xs text-slate-500 mb-6">Bạn đang yêu cầu xóa dữ liệu. Vui lòng nhập mã PIN và nhấn Enter.</p>
            <input type="password" id="authPassword" onkeypress="handleAuthKeyPress(event)" placeholder="••••••" class="w-full text-center border-2 border-slate-100 bg-slate-50 rounded-2xl p-4 font-mono text-2xl tracking-[0.5em] focus:border-rose-400 outline-none mb-6">
            <button onclick="executeDelete()" class="w-full py-4 rounded-2xl text-sm font-bold text-white bg-rose-500 hover:bg-rose-600 transition shadow-lg uppercase">Thực thi Xóa</button>
        </div>
    </div>

    <!-- MODAL SUCCESS (SUBMIT THÀNH CÔNG) -->
    <div id="successModal" class="modal fixed inset-0 bg-slate-900/60 backdrop-blur-sm items-center justify-center p-4 z-[9999]">
        <div class="modal-content bg-white w-full max-w-sm rounded-[32px] p-8 shadow-2xl text-center relative border border-white">
            <button onclick="closeModal('successModal')" class="absolute top-4 right-4 text-slate-400"><i class="fas fa-times"></i></button>
            <div class="w-16 h-16 bg-emerald-50 text-emerald-500 rounded-full flex items-center justify-center mx-auto mb-4 text-3xl"><i class="fas fa-check-circle"></i></div>
            <h3 class="text-xl font-black text-slate-800 mb-2">Nộp báo cáo thành công</h3>
            <p class="text-xs text-slate-500 mb-8">Dữ liệu đã được cập nhật vào Analytics.</p>
            <a href="#analytics" onclick="closeModal('successModal')" class="w-full block py-3.5 rounded-xl bg-blue-600 text-white font-bold text-sm">Xem bảng báo cáo chi tiết</a>
        </div>
    </div>

    <script>
        window.SECRET_KEY = "014023";
        window.courseConfig = [
            { id: 'SPCB', prefix: '26KV', title: 'Sản phẩm Cơ bản', sessions: 5, color: 'blue', status: 'Đang diễn ra', label: 'RETAIL' },
            { id: 'KV1', prefix: 'KV1-26', title: 'Sản phẩm KV1', sessions: 1, color: 'indigo', status: 'Đang diễn ra', label: 'ADVANCED' },
            { id: 'TAX', prefix: 'INV-26', title: 'HĐĐT - Thuế - Kế toán', sessions: 4, color: 'slate', status: 'Đang lên kế hoạch', label: 'SPECIALIST' },
            { id: 'FNB', prefix: 'FNB-26', title: 'KiotViet FNB', sessions: 2, color: 'orange', status: 'Đã hoàn thành', label: 'INDUSTRY' },
            { id: 'SALON', prefix: 'SL-26', title: 'KiotViet Salon', sessions: 2, color: 'fuchsia', status: 'Đang lên kế hoạch', label: 'INDUSTRY' },
            { id: 'HOTEL', prefix: 'HL-26', title: 'KiotViet Hotel', sessions: 2, color: 'emerald', status: 'Đang lên kế hoạch', label: 'INDUSTRY' }
        ];

        window.loadMasterDB = () => JSON.parse(localStorage.getItem('kv_master_db') || '[]');
        window.openModal = id => document.getElementById(id).classList.add('active');
        window.closeModal = id => document.getElementById(id).classList.remove('active');
        
        async function router() {
            let hash = location.hash.slice(1) || 'dashboard';
            let routeKey = hash;
            if(hash.startsWith('course-') || hash.startsWith('tasks-')) {
                const [type, id] = hash.split('-'); 
                localStorage.setItem('currentCourseId', id.toUpperCase()); 
                routeKey = type === 'course' ? 'course-detail' : 'tasks';
            }
            const routes = { 'dashboard':'views/dashboard.html', 'courses':'views/courses.html', 'analytics':'views/analytics.html', 'tools':'views/tools.html', 'calendar':'views/calendar.html', 'course-detail':'views/course-detail.html', 'tasks':'views/tasks.html' };
            const app = document.getElementById('app-root');
            app.classList.add('fade-out');
            try {
                const res = await fetch(`${routes[routeKey]}?v=${Date.now()}`);
                const html = await res.text();
                setTimeout(() => {
                    app.innerHTML = html;
                    app.querySelectorAll('script').forEach(s => { const newS = document.createElement('script'); newS.text = s.text; s.parentNode.replaceChild(newS, s); });
                    app.classList.remove('fade-out');
                }, 150);
            } catch (e) { app.innerHTML = `<div class="p-20 text-center">Trang đang xây dựng...</div>`; }
            document.querySelectorAll('.menu-item').forEach(el => el.classList.toggle('active', el.getAttribute('href') === `#${routeKey}`));
        }
        window.addEventListener('hashchange', router); window.addEventListener('DOMContentLoaded', router);
    </script>
</body>
</html>
