<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trainer Hub | Quản trị Đào tạo</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        /* 5D & Fluid UI Core Variables */
        body { font-family: 'Inter', sans-serif; background-color: #fafafa; color: #0f172a; overflow: hidden; }
        
        .glass-panel { background: #ffffff; border: 1px solid #f1f5f9; }
        .hover-5d { transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1); }
        .hover-5d:hover { transform: translateY(-4px); box-shadow: 0 20px 25px -5px rgba(0,0,0,0.05), 0 8px 10px -6px rgba(0,0,0,0.01); border-color: #e2e8f0; z-index: 10; }

        .custom-scrollbar::-webkit-scrollbar { height: 6px; width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background-color: #94a3b8; }

        /* MỚI: Sidebar Menu Style chuẩn SaaS */
        .menu-item { transition: all 0.2s ease; border-radius: 12px; margin-bottom: 4px; }
        .menu-item:hover { background-color: #f8fafc; color: #0f172a; }
        .menu-item.active { background-color: #f1f5f9; color: #0f172a; font-weight: 700; }
        .menu-item.active i { color: #3b82f6; }

        #app-root { transition: opacity 0.3s ease, transform 0.3s ease; }
        #app-root.fade-out { opacity: 0; transform: translateY(10px); }
        #app-root.fade-in { opacity: 1; transform: translateY(0); }
    </style>
</head>
<body class="flex h-screen antialiased">

    <!-- 1. SIDEBAR NAVIGATION -->
    <aside class="w-64 glass-panel border-r border-slate-200 flex flex-col flex-shrink-0 z-20">
        <!-- Logo -->
        <div class="h-20 flex items-center px-6">
            <i class="fas fa-layer-group text-slate-400 mr-3 text-lg"></i>
            <span class="text-base font-black tracking-tight text-slate-800">Trainer Hub</span>
        </div>

        <!-- Menu Links (Tinh gọn theo ý user) -->
        <nav class="flex-1 overflow-y-auto custom-scrollbar py-2 px-3" id="sidebar-menu">
            <a href="#dashboard" class="menu-item active flex items-center px-4 py-3 text-[13px] font-semibold text-slate-500">
                <i class="fas fa-border-all w-7 text-slate-400 text-base"></i> Dashboard
            </a>
            <a href="#courses" class="menu-item flex items-center px-4 py-3 text-[13px] font-semibold text-slate-500">
                <i class="fas fa-book-open w-7 text-slate-400 text-base"></i> Khóa Học
            </a>
            <a href="#analytics" class="menu-item flex items-center px-4 py-3 text-[13px] font-semibold text-slate-500">
                <i class="fas fa-chart-bar w-7 text-slate-400 text-base"></i> Analytics
            </a>
            <a href="#tools" class="menu-item flex items-center px-4 py-3 text-[13px] font-semibold text-slate-500">
                <i class="fas fa-wrench w-7 text-slate-400 text-base"></i> Công Cụ
            </a>
            <a href="#calendar" class="menu-item flex items-center px-4 py-3 text-[13px] font-semibold text-slate-500">
                <i class="far fa-calendar-alt w-7 text-slate-400 text-base"></i> Lịch Năm
            </a>
        </nav>

        <!-- User Profile -->
        <div class="p-4 border-t border-slate-100">
            <div class="flex items-center gap-3">
                <div class="w-9 h-9 rounded-full bg-slate-100 flex items-center justify-center text-slate-600 font-bold border border-slate-200">
                    N
                </div>
                <div>
                    <p class="text-[13px] font-bold text-slate-800">Nguyễn Lê Nhật Vi - L&D</p>
                    <p class="text-[11px] font-medium text-slate-400">vi.nln@kiotviet.com</p>
                </div>
            </div>
        </div>
    </aside>

    <!-- 2. MAIN CONTENT AREA -->
    <main class="flex-1 flex flex-col h-screen relative bg-white">
        <!-- Dynamic View Container -->
        <div id="app-root" class="flex-1 overflow-y-auto custom-scrollbar p-8 z-10 fade-in">
            <div class="flex items-center justify-center h-full">
                <i class="fas fa-circle-notch fa-spin text-4xl text-blue-500"></i>
            </div>
        </div>
    </main>

    <!-- 3. SPA ROUTER & GLOBAL DATA -->
    <script>
        // GLOBAL DATA (Giữ nguyên không mất 1 chữ của bạn)
        window.SECRET_KEY = "014023";
        window.courseConfig = [
            { id: 'SPCB', label: 'RETAIL', title: 'Sản phẩm Cơ bản', desc: 'Khóa học về sản phẩm cơ bản cho nhân viên bán hàng', sessions: 5, color: 'blue', link: 'course-spcb' },
            { id: 'IND', label: 'INDUSTRY', title: 'Giải Pháp Công Nghiệp', desc: 'Khóa học về giải pháp cho ngành công nghiệp', sessions: 2, color: 'orange', link: 'course-ind' },
            { id: 'TAX', label: 'SPECIALIST', title: 'HĐĐT - Thuế - Kế toán', desc: 'Khóa học chuyên sâu về hóa đơn, thuế và kế toán', sessions: 4, color: 'slate', link: 'course-tax' },
            { id: 'KV1', label: 'ADVANCED', title: 'Sản Phẩm KV1', desc: 'Nâng cao kỹ năng quản lý tình huống nghiệp vụ', sessions: 1, color: 'indigo', link: 'course-kv1' },
            { id: 'FNB', label: 'INDUSTRY', title: 'KiotViet FNB', desc: 'Nghiệp vụ dành riêng cho Nhà hàng, Cafe', sessions: 0, color: 'orange', link: '' },
            { id: 'SALON', label: 'INDUSTRY', title: 'KiotViet Salon', desc: 'Nghiệp vụ quản lý tiệm Spa, Hair Salon', sessions: 0, color: 'fuchsia', link: '' },
            { id: 'HOTEL', label: 'INDUSTRY', title: 'KiotViet Hotel', desc: 'Giải pháp quản lý cơ sở lưu trú, khách sạn', sessions: 0, color: 'emerald', link: '' }
        ];

        window.employeeData = [
            { role: 'Manager', dept: 'Administration', position: 'Admin Manager', name: 'Nguyễn Thúy An', email: 'an.nt@kiotviet.com', code: 'SG00001' },
            { role: 'Manager', dept: 'Administration', position: 'Admin Manager', name: 'Phùng Thị Dung', email: 'dungphung@kiotviet.com', code: 'HN00004' },
            { role: 'Manager', dept: 'BD - KVF', position: 'BDM', name: 'Nguyễn Bảo Anh', email: 'anhnguyen@kiotviet.com', code: 'HN04303' },
            { role: 'Manager', dept: 'BOD', position: 'Deputy General Director', name: 'Đỗ Tuấn Anh', email: 'tuananh@kiotviet.com', code: 'HN00226' },
            { role: 'Manager', dept: 'BOD', position: 'Deputy General Director', name: 'Nguyễn Tiến Trung', email: 'tony@kiotviet.com', code: 'HN00002' },
            { role: 'Manager', dept: 'BOD', position: 'General Director', name: 'Trần Nguyên Hạo', email: 'hao@kiotviet.com', code: 'HN00001' }
            // (Data thực tế vẫn nằm trong code tools.html bên dưới, tôi sẽ xử lý logic đọc data chuẩn)
        ];

        window.loadMasterDB = function() {
            let data = JSON.parse(localStorage.getItem('kv_master_db')) || [];
            const now = new Date().getTime();
            let isChanged = false;
            data = data.filter(item => {
                if (!item.timestamp) { item.timestamp = now; isChanged = true; }
                return (now - item.timestamp) <= (365 * 24 * 60 * 60 * 1000);
            });
            if (isChanged) localStorage.setItem('kv_master_db', JSON.stringify(data));
            return data;
        };

        // ROUTER CONFIG
        const routes = {
            'dashboard': { file: 'views/dashboard.html', sidebar: 'dashboard' },
            'courses': { file: 'views/dashboard.html', sidebar: 'courses' }, // Dùng chung layout với dashboard
            'analytics': { file: 'views/analytics.html', sidebar: 'analytics' },
            'tools': { file: 'views/tools.html', sidebar: 'tools' },
            'calendar': { file: 'views/calendar.html', sidebar: 'calendar' },
            // Trỏ đến trang khóa học chi tiết
            'course-spcb': { file: 'views/spcb.html', sidebar: 'courses' },
            'course-kv1': { file: 'views/kv1.html', sidebar: 'courses' },
            'course-tax': { file: 'views/tax.html', sidebar: 'courses' }
        };

        const appRoot = document.getElementById('app-root');

        async function router() {
            let hash = window.location.hash.replace('#', '') || 'dashboard';
            if (!routes[hash]) hash = 'dashboard';

            const route = routes[hash];
            updateSidebarActive(route.sidebar);

            appRoot.classList.remove('fade-in');
            appRoot.classList.add('fade-out');

            try {
                const response = await fetch(route.file);
                if (!response.ok) throw new Error('File not found');
                const htmlString = await response.text();
                
                setTimeout(() => {
                    appRoot.innerHTML = htmlString;
                    executeScripts(appRoot);
                    appRoot.classList.remove('fade-out');
                    appRoot.classList.add('fade-in');
                }, 200);
            } catch (error) {
                appRoot.innerHTML = `<div class="text-center mt-20 text-slate-500">Đang phát triển file <b>${route.file}</b>... Vui lòng tạo file này trong thư mục views/</div>`;
                appRoot.classList.remove('fade-out');
                appRoot.classList.add('fade-in');
            }
        }

        function updateSidebarActive(sidebarId) {
            document.querySelectorAll('.menu-item').forEach(item => {
                item.classList.remove('active');
                if (item.getAttribute('href') === `#${sidebarId}`) item.classList.add('active');
            });
        }

        function executeScripts(container) {
            const scripts = container.querySelectorAll('script');
            scripts.forEach(oldScript => {
                const newScript = document.createElement('script');
                Array.from(oldScript.attributes).forEach(attr => newScript.setAttribute(attr.name, attr.value));
                newScript.appendChild(document.createTextNode(oldScript.innerHTML));
                oldScript.parentNode.replaceChild(newScript, oldScript);
            });
        }

        window.addEventListener('hashchange', router);
        window.addEventListener('DOMContentLoaded', router);
    </script>
</body>
</html>
