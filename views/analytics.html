<div class="h-full flex flex-col">
    <div class="flex justify-between items-end mb-6">
        <div>
            <h1 class="text-3xl font-black text-slate-900 tracking-tight">Analytics & Báo Cáo</h1>
            <p class="text-sm text-slate-500 mt-1">Thống kê hiệu suất đào tạo (Dữ liệu lưu 365 ngày)</p>
        </div>
        <button onclick="exportCSV()" class="px-5 py-2.5 bg-blue-600 text-white rounded-lg text-sm font-bold hover:bg-blue-700 transition shadow-md flex items-center gap-2">
            <i class="fas fa-file-export"></i> Xuất Excel
        </button>
    </div>

    <!-- TÌM KIẾM & BỘ LỌC -->
    <div class="bg-white p-3 rounded-2xl border border-slate-200 flex flex-wrap gap-3 mb-6 shadow-sm">
        <div class="relative flex-grow max-w-sm">
            <i class="fas fa-search absolute left-4 top-3 text-slate-400"></i>
            <input type="text" id="ana-search" oninput="handleSearchReport(this.value)" placeholder="Tra cứu mã khóa, nhóm..." class="w-full pl-10 pr-4 py-2 border border-slate-200 rounded-xl text-sm outline-none focus:border-blue-400 bg-slate-50">
        </div>
        <select id="ana-month" onchange="renderAnalytics()" class="border border-slate-200 bg-slate-50 rounded-xl px-4 py-2 text-sm text-slate-700 outline-none font-bold cursor-pointer">
            <option value="all">Tất cả các tháng</option>
            <option value="1">Tháng 1</option><option value="2">Tháng 2</option><option value="3">Tháng 3</option>
            <option value="4">Tháng 4</option><option value="5">Tháng 5</option><option value="6">Tháng 6</option>
            <option value="7">Tháng 7</option><option value="8">Tháng 8</option><option value="9">Tháng 9</option>
            <option value="10">Tháng 10</option><option value="11">Tháng 11</option><option value="12">Tháng 12</option>
        </select>
        <button onclick="requestDelete(-1)" class="ml-auto w-10 h-10 flex items-center justify-center rounded-xl bg-rose-50 text-rose-500 hover:bg-rose-500 hover:text-white transition border border-rose-100" title="Dọn sạch Master DB">
            <i class="fas fa-trash-alt"></i>
        </button>
    </div>

    <!-- 4 THẺ CHỈ SỐ -->
    <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
        <div class="border border-slate-200 rounded-2xl p-5 bg-white shadow-sm flex flex-col justify-between h-28">
            <span class="text-xs font-bold text-slate-500 uppercase tracking-widest">Tổng Khóa Học</span>
            <div class="flex items-end gap-2"><div class="text-3xl font-black text-slate-800" id="ana-total-course">0</div><span class="text-xs text-slate-400 font-medium mb-1">khóa</span></div>
        </div>
        <div class="border border-slate-200 rounded-2xl p-5 bg-white shadow-sm flex flex-col justify-between h-28">
            <span class="text-xs font-bold text-slate-500 uppercase tracking-widest">Tổng Học Viên</span>
            <div class="flex items-end gap-2"><div class="text-3xl font-black text-slate-800" id="ana-total-trainee">0</div><span class="text-xs text-slate-400 font-medium mb-1">học viên</span></div>
        </div>
        <div class="border border-slate-200 rounded-2xl p-5 bg-white shadow-sm flex flex-col justify-between h-28 border-b-4 border-b-emerald-500">
            <span class="text-xs font-bold text-emerald-600 uppercase tracking-widest">Học Viên Đạt</span>
            <div class="flex items-end gap-2"><div class="text-3xl font-black text-emerald-500" id="ana-total-pass">0</div><span class="text-xs text-emerald-400 font-bold mb-1">pass</span></div>
        </div>
        <div class="border border-slate-200 rounded-2xl p-5 bg-slate-900 shadow-sm flex flex-col justify-between h-28">
            <span class="text-xs font-bold text-slate-400 uppercase tracking-widest">Tỷ Lệ Hoàn Thành</span>
            <div class="flex items-end gap-2"><div class="text-3xl font-black text-white" id="ana-rate">0%</div><span class="text-xs text-slate-500 font-medium mb-1">trung bình</span></div>
        </div>
    </div>

    <!-- CHARTS -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-6 shrink-0">
        <div class="bg-white border border-slate-200 rounded-2xl p-6 shadow-sm col-span-1 h-72">
            <h3 class="text-sm font-bold text-slate-800 mb-4">Tỷ Lệ Trạng Thái</h3>
            <div class="w-full h-48"><canvas id="anaStatusChart"></canvas></div>
        </div>
        <div class="bg-white border border-slate-200 rounded-2xl p-6 shadow-sm col-span-1 md:col-span-2 h-72">
            <h3 class="text-sm font-bold text-slate-800 mb-4">Hiệu Suất Đạt / Fail</h3>
            <div class="w-full h-52"><canvas id="anaPerfChart"></canvas></div>
        </div>
    </div>

    <!-- TABLE -->
    <div class="bg-white border border-slate-200 rounded-2xl overflow-hidden flex-grow flex flex-col shadow-sm">
        <div class="overflow-x-auto custom-scrollbar flex-grow">
            <table class="w-full text-left text-[13px] font-medium">
                <thead class="bg-slate-50 sticky top-0 z-10 border-b border-slate-200">
                    <tr>
                        <th class="px-5 py-4 text-slate-500 font-bold text-xs uppercase tracking-wider">Nhóm</th>
                        <th class="px-5 py-4 text-slate-500 font-bold text-xs uppercase tracking-wider">Mã Khóa</th>
                        <th class="px-5 py-4 text-slate-500 font-bold text-xs uppercase tracking-wider text-center">Tháng</th>
                        <th class="px-5 py-4 text-slate-500 font-bold text-xs uppercase tracking-wider text-center">Tổng HV</th>
                        <th class="px-5 py-4 text-emerald-600 font-bold text-xs uppercase tracking-wider text-center">Đạt</th>
                        <th class="px-5 py-4 text-rose-500 font-bold text-xs uppercase tracking-wider text-center">Fail</th>
                        <th class="px-5 py-4 text-slate-500 font-bold text-xs uppercase tracking-wider text-center">Trạng Thái</th>
                        <th class="px-5 py-4 text-slate-500 font-bold text-xs uppercase tracking-wider text-center">Xóa</th>
                    </tr>
                </thead>
                <tbody id="ana-table-body" class="divide-y divide-slate-100 text-slate-700"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    let statusChart = null, perfChart = null;
    let anaState = { search: '', month: 'all' };

    function getFilteredData() {
        let db = window.loadMasterDB();
        if (anaState.month !== 'all') db = db.filter(d => d.month == anaState.month);
        if (anaState.search !== "") db = db.filter(d => 
            (d.courseId && d.courseId.toLowerCase().includes(anaState.search)) || 
            (d.groupName && d.groupName.toLowerCase().includes(anaState.search))
        );
        return db;
    }

    function handleSearchReport(val) { anaState.search = val.toLowerCase(); renderAnalytics(); }

    function renderAnalytics() {
        anaState.month = document.getElementById('ana-month').value;
        const data = getFilteredData();
        const allDb = window.loadMasterDB();

        // 1. Tính toán thẻ chỉ số
        let tCourse = data.length, tTrainee = 0, tPass = 0, tFail = 0;
        const sCounts = { 'Hoàn thành': 0, 'Đang diễn ra': 0, 'Dời lịch': 0, 'Hủy': 0 };

        data.forEach(item => {
            tTrainee += parseInt(item.totalTrainees) || 0;
            tPass += parseInt(item.passedTrainees) || 0;
            tFail += parseInt(item.failedTrainees) || 0;
            if(sCounts[item.status] !== undefined) sCounts[item.status]++;
        });

        const rate = tTrainee > 0 ? Math.round((tPass/tTrainee)*100) : 0;
        document.getElementById('ana-total-course').innerText = tCourse;
        document.getElementById('ana-total-trainee').innerText = tTrainee;
        document.getElementById('ana-total-pass').innerText = tPass;
        document.getElementById('ana-rate').innerText = rate + '%';

        // 2. Vẽ Biểu đồ
        Chart.defaults.font.family = 'Inter';
        const ctxS = document.getElementById('anaStatusChart').getContext('2d');
        if(statusChart) statusChart.destroy();
        statusChart = new Chart(ctxS, {
            type: 'doughnut',
            data: { labels: ['Hoàn thành', 'Đang diễn', 'Dời lịch', 'Hủy'], datasets: [{ data: [sCounts['Hoàn thành'], sCounts['Đang diễn ra'], sCounts['Dời lịch'], sCounts['Hủy']], backgroundColor: ['#10b981', '#3b82f6', '#f59e0b', '#ef4444'], borderWidth: 0 }] },
            options: { responsive: true, maintainAspectRatio: false, cutout: '75%', plugins: { legend: { position: 'right', labels: { usePointStyle: true, boxWidth: 6, font: {size: 11} } } } }
        });

        const ctxP = document.getElementById('anaPerfChart').getContext('2d');
        if(perfChart) perfChart.destroy();
        perfChart = new Chart(ctxP, {
            type: 'bar',
            data: { labels: ['HV Đạt', 'HV Fail'], datasets: [{ data: [tPass, tFail], backgroundColor: ['#10b981', '#f43f5e'], borderRadius: 8, barThickness: 40 }] },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, border: {display: false} }, x: { grid: { display: false }, border: {display: false} } } }
        });

        // 3. Đổ dữ liệu Table
        const tbody = document.getElementById('ana-table-body');
        tbody.innerHTML = '';
        if(data.length === 0) {
            tbody.innerHTML = `<tr><td colspan="8" class="text-center py-10 text-slate-400 italic">Chưa có dữ liệu</td></tr>`;
            return;
        }

        data.forEach(item => {
            const realIdx = allDb.findIndex(d => d.courseId === item.courseId && d.timestamp === item.timestamp);
            let sClass = "bg-slate-100 text-slate-600";
            if(item.status === 'Hoàn thành') sClass = "bg-emerald-50 text-emerald-600 border border-emerald-100";
            if(item.status === 'Đang diễn ra') sClass = "bg-blue-50 text-blue-600 border border-blue-100";
            
            tbody.innerHTML += `
                <tr class="hover:bg-slate-50 transition">
                    <td class="px-5 py-4 font-bold text-slate-800">${item.groupName}</td>
                    <td class="px-5 py-4 font-bold text-blue-600">${item.courseId}</td>
                    <td class="px-5 py-4 text-center font-bold text-slate-500">T${item.month}</td>
                    <td class="px-5 py-4 text-center font-bold bg-slate-50/50">${item.totalTrainees || 0}</td>
                    <td class="px-5 py-4 text-center font-bold text-emerald-600 bg-emerald-50/30">${item.passedTrainees || 0}</td>
                    <td class="px-5 py-4 text-center font-bold text-rose-500 bg-rose-50/30">${item.failedTrainees || 0}</td>
                    <td class="px-5 py-4 text-center"><span class="px-3 py-1 rounded text-[10px] font-black uppercase ${sClass}">${item.status}</span></td>
                    <td class="px-5 py-4 text-center"><button onclick="requestDelete(${realIdx})" class="w-8 h-8 rounded-full bg-white text-rose-400 hover:bg-rose-500 hover:text-white border border-rose-100 transition shadow-sm"><i class="fas fa-trash text-xs"></i></button></td>
                </tr>
            `;
        });
    }

    function requestDelete(idx) {
        const pass = prompt("Nhập mã PIN để xóa (Mã: 014023):");
        if (pass !== window.SECRET_KEY) { alert("Sai mã PIN!"); return; }
        
        if (idx === -1) {
            if(confirm("CẢNH BÁO: Xóa SẠCH toàn bộ dữ liệu?")) { localStorage.removeItem('kv_master_db'); renderAnalytics(); }
        } else {
            if(confirm("Xóa dòng báo cáo này?")) {
                let db = window.loadMasterDB(); db.splice(idx, 1);
                localStorage.setItem('kv_master_db', JSON.stringify(db)); renderAnalytics();
            }
        }
    }

    function exportCSV() {
        const data = getFilteredData();
        if(!data.length) { alert('Không có dữ liệu!'); return; }
        let csv = "\uFEFFNhóm Khóa,Mã Khóa,Tháng,Bắt Đầu,Kết Thúc,Tổng HV,Đạt,Fail,Trạng Thái\n";
        data.forEach(i => { csv += `${i.groupName},${i.courseId},${i.month},${i.startDate},${i.finishDate},${i.totalTrainees||0},${i.passedTrainees||0},${i.failedTrainees||0},${i.status}\n`; });
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a"); link.href = URL.createObjectURL(blob); 
        link.setAttribute("download", `Trainer_Report_${new Date().getTime()}.csv`); link.click();
    }

    setTimeout(renderAnalytics, 100);
</script>
