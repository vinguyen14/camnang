<div class="max-w-6xl mx-auto space-y-8">
    <div class="flex justify-between items-end">
        <div>
            <h1 class="text-3xl font-black text-slate-800 tracking-tight">Tổng Quan Hệ Thống</h1>
            <p class="text-sm font-medium text-slate-500 mt-1">Dữ liệu phân tích hiệu suất đào tạo thời gian thực</p>
        </div>
    </div>

    <!-- 4 THẺ CHỈ SỐ -->
    <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
        <div class="bg-white border border-slate-200 rounded-3xl p-6 shadow-sm hover:shadow-md transition">
            <div class="flex justify-between items-start mb-4"><span class="text-xs font-bold text-slate-400 uppercase tracking-widest">Khóa Học</span><div class="w-8 h-8 rounded-xl bg-blue-50 text-blue-500 flex items-center justify-center"><i class="fas fa-book"></i></div></div>
            <div class="text-4xl font-black text-slate-800" id="d-total-c">0</div>
        </div>
        <div class="bg-white border border-slate-200 rounded-3xl p-6 shadow-sm hover:shadow-md transition">
            <div class="flex justify-between items-start mb-4"><span class="text-xs font-bold text-slate-400 uppercase tracking-widest">Học Viên</span><div class="w-8 h-8 rounded-xl bg-indigo-50 text-indigo-500 flex items-center justify-center"><i class="fas fa-users"></i></div></div>
            <div class="text-4xl font-black text-slate-800" id="d-total-t">0</div>
        </div>
        <div class="bg-white border border-emerald-200 rounded-3xl p-6 shadow-sm hover:shadow-md transition">
            <div class="flex justify-between items-start mb-4"><span class="text-xs font-bold text-emerald-500 uppercase tracking-widest">HV Đạt</span><div class="w-8 h-8 rounded-xl bg-emerald-50 text-emerald-500 flex items-center justify-center"><i class="fas fa-check-circle"></i></div></div>
            <div class="text-4xl font-black text-emerald-500" id="d-total-p">0</div>
        </div>
        <div class="bg-white border border-blue-200 rounded-3xl p-6 shadow-sm hover:shadow-md transition border-b-4 border-b-blue-500">
            <div class="flex justify-between items-start mb-4"><span class="text-xs font-bold text-blue-500 uppercase tracking-widest">Tỷ Lệ</span><div class="w-8 h-8 rounded-xl bg-blue-50 text-blue-500 flex items-center justify-center"><i class="fas fa-arrow-trend-up"></i></div></div>
            <div class="text-4xl font-black text-blue-600" id="d-rate">0%</div>
        </div>
    </div>

    <!-- AI INSIGHT BOX -->
    <div class="bg-slate-900 rounded-[40px] p-10 text-white relative overflow-hidden shadow-2xl">
        <div class="absolute top-0 right-0 w-64 h-64 bg-blue-600 rounded-full blur-[100px] opacity-20 -mr-20 -mt-20"></div>
        <div class="flex items-center gap-4 mb-6">
            <div class="w-12 h-12 rounded-2xl bg-white/10 flex items-center justify-center text-yellow-400 text-2xl border border-white/10 shadow-inner"><i class="fas fa-lightbulb"></i></div>
            <h3 class="text-xl font-black tracking-tight">AI Trainer Insight</h3>
        </div>
        <div id="ai-insight-content" class="text-slate-300 font-medium leading-relaxed max-w-2xl">Đang phân tích dữ liệu khóa học...</div>
    </div>
</div>

<script>
    function renderDashboard() {
        const db = window.loadMasterDB();
        let sumT = 0, sumP = 0;
        db.forEach(i => { sumT += parseInt(i.totalTrainees)||0; sumP += parseInt(i.passedTrainees)||0; });
        const rate = sumT > 0 ? Math.round((sumP/sumT)*100) : 0;

        document.getElementById('d-total-c').innerText = db.length;
        document.getElementById('d-total-t').innerText = sumT;
        document.getElementById('d-total-p').innerText = sumP;
        document.getElementById('d-rate').innerText = rate + '%';

        const ai = document.getElementById('ai-insight-content');
        if(db.length === 0) ai.innerHTML = "Hệ thống chưa có dữ liệu. Vui lòng nộp báo cáo khóa học đầu tiên để AI có thể phân tích.";
        else if(rate >= 90) ai.innerHTML = `<span class='text-emerald-400 font-bold'>Hiệu suất Xuất sắc!</span> Tỷ lệ đạt ${rate}% cho thấy giáo án đang rất phù hợp. Bạn nên duy trì kịch bản này và tập trung vào việc tối ưu hóa thời gian giảng dạy.`;
        else if(rate >= 75) ai.innerHTML = `<span class='text-yellow-400 font-bold'>Cần Lưu Ý.</span> Tỷ lệ đạt ở mức trung bình (${rate}%). AI phát hiện có một số học viên gặp khó khăn ở phần thi Quiz. Hãy cân nhắc dành thêm 15 phút giải đáp thắc mắc trước khi thi.`;
        else ai.innerHTML = `<span class='text-rose-400 font-bold'>Báo động Đỏ!</span> Tỷ lệ hoàn thành đang dưới mức kỳ vọng. Bạn cần kiểm tra lại nội dung đào tạo hoặc tăng cường hỗ trợ 1-1 cho các nhóm học viên yếu.`;
    }
    renderDashboard();
</script>
