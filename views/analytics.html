<div class="h-full flex flex-col max-w-6xl mx-auto">
    <div class="flex flex-col md:flex-row justify-between items-start md:items-end mb-8 gap-4">
        <div>
            <h1 class="text-3xl font-black text-slate-800 tracking-tight">Analytics & Báo Cáo</h1>
            <p class="text-sm font-medium text-slate-500 mt-1">Thống kê hiệu suất đào tạo toàn hệ thống</p>
        </div>
        <button onclick="exportExcelFull()" class="px-6 py-2.5 bg-blue-600 text-white rounded-xl text-sm font-bold hover:bg-blue-700 transition shadow-[0_8px_20px_-6px_rgba(37,99,235,0.5)] flex items-center gap-2">
            <i class="fas fa-file-excel"></i> Xuất Excel
        </button>
    </div>

    <!-- 4 THẺ CHỈ SỐ -->
    <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
        <div class="border border-slate-200 rounded-2xl p-5 bg-white shadow-sm flex flex-col justify-between h-28">
            <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Tổng Khóa Học</span>
            <div class="text-3xl font-black text-slate-800" id="ana-total-course">0</div>
        </div>
        <div class="border border-slate-200 rounded-2xl p-5 bg-white shadow-sm flex flex-col justify-between h-28">
            <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Tổng Học Viên</span>
            <div class="text-3xl font-black text-slate-800" id="ana-total-trainee">0</div>
        </div>
        <div class="border border-emerald-200 rounded-2xl p-5 bg-emerald-50/30 shadow-sm flex flex-col justify-between h-28">
            <span class="text-[10px] font-black text-emerald-600 uppercase tracking-widest">Học Viên Đạt</span>
            <div class="text-3xl font-black text-emerald-600" id="ana-total-pass">0</div>
        </div>
        <div class="border border-blue-200 rounded-2xl p-5 bg-blue-50/30 shadow-sm flex flex-col justify-between h-28">
            <span class="text-[10px] font-black text-blue-600 uppercase tracking-widest">Tỷ Lệ Hoàn Thành</span>
            <div class="text-3xl font-black text-blue-600" id="ana-rate">0%</div>
        </div>
    </div>

    <!-- CHARTS -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8 shrink-0">
        <div class="bg-white border border-slate-200 rounded-2xl p-6 shadow-sm col-span-1 h-72">
            <h3 class="text-sm font-bold text-slate-700 mb-4">Tỷ Lệ Đạt / Fail</h3>
            <div class="w-full h-48"><canvas id="anaStatusChart"></canvas></div>
        </div>
        <div class="bg-white border border-slate-200 rounded-2xl p-6 shadow-sm col-span-1 md:col-span-2 h-72">
            <h3 class="text-sm font-bold text-slate-700 mb-4">Hiệu Suất Theo Khóa</h3>
            <div class="w-full h-52"><canvas id="anaPerfChart"></canvas></div>
        </div>
    </div>

    <!-- BỘ LỌC BẢNG -->
    <div class="bg-white p-3 rounded-t-2xl border border-slate-200 border-b-0 flex flex-wrap gap-3 items-center">
        <h3 class="text-sm font-bold text-slate-800 ml-2">Chi Tiết Báo Cáo</h3>
        <div class="relative ml-auto w-64">
            <i class="fas fa-search absolute left-4 top-2.5 text-slate-400"></i>
            <input type="text" id="ana-search" oninput="handleSearchReport(this.value)" placeholder="Tra cứu mã khóa..." class="w-full pl-10 pr-4 py-2 border border-slate-200 rounded-lg text-sm outline-none focus:border-blue-400 bg-slate-50">
        </div>
        <button onclick="openDeleteModal(-1)" class="w-9 h-9 flex items-center justify-center rounded-lg bg-white text-rose-500 hover:bg-rose-50 border border-rose-200 transition shadow-sm" title="Dọn sạch Master DB">
            <i class="fas fa-trash-alt text-sm"></i>
        </button>
    </div>

    <!-- TABLE -->
    <div class="bg-white border border-slate-200 rounded-b-2xl overflow-hidden flex-grow flex flex-col shadow-sm pb-10">
        <div class="overflow-x-auto custom-scrollbar flex-grow">
            <table class="w-full text-left text-[13px] font-medium">
                <thead class="bg-slate-50 sticky top-0 z-10 border-b border-slate-200">
                    <tr>
                        <th class="px-5 py-4 text-slate-500 font-bold text-[10px] uppercase tracking-wider">Nhóm</th>
                        <th class="px-5 py-4 text-slate-500 font-bold text-[10px] uppercase tracking-wider">Mã Khóa</th>
                        <th class="px-5 py-4 text-slate-500 font-bold text-[10px] uppercase tracking-wider text-center">Tháng</th>
                        <th class="px-5 py-4 text-slate-500 font-bold text-[10px] uppercase tracking-wider text-center">Tổng HV</th>
                        <th class="px-5 py-4 text-emerald-600 font-bold text-[10px] uppercase tracking-wider text-center">Đạt</th>
                        <th class="px-5 py-4 text-rose-500 font-bold text-[10px] uppercase tracking-wider text-center">Fail</th>
                        <th class="px-5 py-4 text-slate-500 font-bold text-[10px] uppercase tracking-wider text-center">Links</th>
                        <th class="px-5 py-4 text-slate-500 font-bold text-[10px] uppercase tracking-wider text-center">Trạng Thái</th>
                        <th class="px-5 py-4 text-slate-500 font-bold text-[10px] uppercase tracking-wider text-center">Xóa</th>
                    </tr>
                </thead>
                <tbody id="ana-table-body" class="divide-y divide-slate-100 text-slate-700"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    let statusChart = null, perfChart = null;
    let anaState = { search: '', month: 'all' };

    function getFilteredData() {
        let db = window.loadMasterDB();
        if (anaState.search !== "") db = db.filter(d => 
            (d.courseId && d.courseId.toLowerCase().includes(anaState.search)) || 
            (d.groupName && d.groupName.toLowerCase().includes(anaState.search))
        );
        return db;
    }

    function handleSearchReport(val) { anaState.search = val.toLowerCase(); renderAnalytics(); }

    function renderAnalytics() {
        const data = getFilteredData();
        const allDb = window.loadMasterDB();

        // 1. Tính toán thẻ chỉ số
        let tCourse = data.length, tTrainee = 0, tPass = 0, tFail = 0;
        data.forEach(item => {
            tTrainee += parseInt(item.totalTrainees) || 0;
            tPass += parseInt(item.passedTrainees) || 0;
            tFail += parseInt(item.failedTrainees) || 0;
        });

        const rate = tTrainee > 0 ? Math.round((tPass/tTrainee)*100) : 0;
        document.getElementById('ana-total-course').innerText = tCourse;
        document.getElementById('ana-total-trainee').innerText = tTrainee;
        document.getElementById('ana-total-pass').innerText = tPass;
        document.getElementById('ana-rate').innerText = rate + '%';

        // 2. Vẽ Biểu đồ (Doughnut cho tỷ lệ Pass/Fail)
        Chart.defaults.font.family = 'Inter';
        const ctxS = document.getElementById('anaStatusChart').getContext('2d');
        if(statusChart) statusChart.destroy();
        statusChart = new Chart(ctxS, {
            type: 'doughnut',
            data: { labels: ['Đạt', 'Fail'], datasets: [{ data: [tPass, tFail], backgroundColor: ['#10b981', '#f43f5e'], borderWidth: 0 }] },
            options: { responsive: true, maintainAspectRatio: false, cutout: '75%', plugins: { legend: { position: 'bottom', labels: { usePointStyle: true, boxWidth: 6, font: {size: 11} } } } }
        });

        // 3. Đổ dữ liệu Table
        const tbody = document.getElementById('ana-table-body');
        tbody.innerHTML = '';
        if(data.length === 0) {
            tbody.innerHTML = `<tr><td colspan="9" class="text-center py-16 text-slate-400 italic font-medium">Chưa có dữ liệu</td></tr>`;
            if(perfChart) perfChart.destroy();
            return;
        }

        // Vẽ biểu đồ Cột hiệu suất theo từng khóa
        const courseLabels = data.map(d => d.courseId);
        const passData = data.map(d => parseInt(d.passedTrainees)||0);
        const failData = data.map(d => parseInt(d.failedTrainees)||0);

        const ctxP = document.getElementById('anaPerfChart').getContext('2d');
        if(perfChart) perfChart.destroy();
        perfChart = new Chart(ctxP, {
            type: 'bar',
            data: { labels: courseLabels, datasets: [
                { label: 'Đạt', data: passData, backgroundColor: '#10b981', borderRadius: 4 },
                { label: 'Fail', data: failData, backgroundColor: '#f43f5e', borderRadius: 4 }
            ]},
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, border: {display: false}, grid:{color:'#f1f5f9'} }, x: { grid: { display: false }, border: {display: false} } } }
        });

        data.forEach(item => {
            const realIdx = allDb.findIndex(d => d.courseId === item.courseId && d.timestamp === item.timestamp);
            let sClass = "bg-slate-100 text-slate-600";
            if(item.status === 'Hoàn thành') sClass = "bg-emerald-50 text-emerald-600 border border-emerald-100";
            if(item.status === 'Đang diễn ra') sClass = "bg-blue-50 text-blue-600 border border-blue-100";
            
            // Xử lý nút Link
            const linkDS = item.listLink ? `<a href="${item.listLink}" target="_blank" class="text-emerald-600 hover:text-emerald-700 mx-1" title="DS Gốc"><i class="fas fa-file-excel"></i></a>` : '';
            const linkQZ = item.quizLink ? `<a href="${item.quizLink}" target="_blank" class="text-purple-500 hover:text-purple-600 mx-1" title="Kết quả Quiz/LMS"><i class="fas fa-poll"></i></a>` : '';
            
            tbody.innerHTML += `
                <tr class="hover:bg-blue-50/30 transition">
                    <td class="px-5 py-4 font-black text-slate-700 text-xs">${item.groupName}</td>
                    <td class="px-5 py-4 font-black text-blue-600 text-xs">${item.courseId}</td>
                    <td class="px-5 py-4 text-center font-bold text-slate-500 text-xs">Tháng ${item.month}</td>
                    <td class="px-5 py-4 text-center font-black bg-slate-50/50">${item.totalTrainees || 0}</td>
                    <td class="px-5 py-4 text-center font-black text-emerald-600 bg-emerald-50/30">${item.passedTrainees || 0}</td>
                    <td class="px-5 py-4 text-center font-black text-rose-500 bg-rose-50/30">${item.failedTrainees || 0}</td>
                    <td class="px-5 py-4 text-center text-sm">${linkDS}${linkQZ}</td>
                    <td class="px-5 py-4 text-center"><span class="px-2.5 py-1 rounded-md text-[10px] font-black uppercase ${sClass}">${item.status}</span></td>
                    <td class="px-5 py-4 text-center"><button onclick="window.openDeleteModal(${realIdx})" class="w-7 h-7 rounded-full bg-white text-rose-400 hover:bg-rose-500 hover:text-white border border-rose-100 transition shadow-sm"><i class="fas fa-trash text-[10px]"></i></button></td>
                </tr>
            `;
        });
    }

    function exportExcelFull() {
        const data = getFilteredData();
        if(!data.length) { alert('Không có dữ liệu!'); return; }
        let csv = "\uFEFFNhóm Khóa,Mã Khóa,Tháng,Bắt Đầu,Kết Thúc,Tổng HV,Đạt,Fail,Trạng Thái,Link DS Gốc,Link Quiz/LMS\n";
        data.forEach(i => { csv += `${i.groupName},${i.courseId},${i.month},${i.startDate},${i.finishDate},${i.totalTrainees||0},${i.passedTrainees||0},${i.failedTrainees||0},${i.status},${i.listLink||''},${i.quizLink||''}\n`; });
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a"); link.href = URL.createObjectURL(blob); 
        link.setAttribute("download", `Trainer_Report_FullLinks_${new Date().getTime()}.csv`); link.click();
    }

    setTimeout(renderAnalytics, 100);
</script>
