<div class="h-full flex flex-col">
    <!-- 4 THẺ CHỈ SỐ -->
    <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6 shrink-0">
        <div class="bg-white border border-slate-200 rounded-2xl p-5 shadow-sm h-28 hover-5d transition-all">
            <span class="text-[11px] font-bold text-slate-500 uppercase tracking-widest">Khóa Học</span>
            <div class="mt-4 text-3xl font-black text-slate-800" id="ana-total-course">0</div>
        </div>
        <div class="bg-white border border-slate-200 rounded-2xl p-5 shadow-sm h-28 hover-5d transition-all">
            <span class="text-[11px] font-bold text-slate-500 uppercase tracking-widest">Học Viên</span>
            <div class="mt-4 text-3xl font-black text-slate-800" id="ana-total-trainee">0</div>
        </div>
        <div class="bg-white border border-emerald-200 rounded-2xl p-5 shadow-sm h-28 hover-5d transition-all">
            <span class="text-[11px] font-bold text-emerald-600 uppercase tracking-widest">HV Đạt</span>
            <div class="mt-4 text-3xl font-black text-emerald-500" id="ana-total-pass">0 <i class="fas fa-check-circle text-sm"></i></div>
        </div>
        <div class="bg-white border border-blue-200 rounded-2xl p-5 shadow-sm h-28 hover-5d transition-all">
            <span class="text-[11px] font-bold text-blue-600 uppercase tracking-widest">Tỷ Lệ</span>
            <div class="mt-4 text-3xl font-black text-blue-600" id="ana-rate">0%</div>
        </div>
    </div>

    <!-- CHARTS -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6 shrink-0">
        <div class="bg-white border border-slate-200 rounded-2xl p-5 shadow-sm h-64 flex flex-col">
            <h3 class="text-[11px] font-black text-slate-400 uppercase mb-4">Tỷ Lệ Đạt / Fail</h3>
            <div class="w-full flex-grow"><canvas id="anaStatusChart"></canvas></div>
        </div>
        <div class="bg-white border border-slate-200 rounded-2xl p-5 shadow-sm h-64 flex flex-col md:col-span-2">
            <h3 class="text-[11px] font-black text-slate-400 uppercase mb-4">Hiệu Suất Từng Khóa</h3>
            <div class="w-full flex-grow"><canvas id="anaPerfChart"></canvas></div>
        </div>
    </div>

    <!-- TABLE CHI TIẾT -->
    <div class="bg-white border border-slate-200 rounded-2xl overflow-hidden flex-grow flex flex-col shadow-sm pb-10">
        <div class="p-3 border-b border-slate-200 flex justify-between items-center bg-slate-50/50">
            <h3 class="text-sm font-bold text-slate-800 ml-2">Chi Tiết Báo Cáo</h3>
            <div class="flex gap-2">
                <input type="text" id="anaSearch" oninput="renderAnalytics()" placeholder="Tìm khóa..." class="px-3 py-1.5 border border-slate-200 rounded-lg text-xs outline-none focus:border-blue-400">
                <button onclick="window.requestDelete(-1)" class="w-8 h-8 rounded-lg bg-white border text-rose-500 hover:bg-rose-50 transition shadow-sm"><i class="fas fa-trash-alt text-[10px]"></i></button>
            </div>
        </div>
        <div class="overflow-x-auto custom-scrollbar flex-grow">
            <table class="w-full text-left text-[11px] font-medium">
                <thead class="bg-slate-50 sticky top-0 z-10 border-b border-slate-200">
                    <tr>
                        <th class="px-4 py-3 text-slate-400 uppercase w-8 text-center">#</th>
                        <th class="px-4 py-3 text-slate-500 uppercase">NHÓM</th>
                        <th class="px-4 py-3 text-slate-500 uppercase">MÃ KHÓA</th>
                        <th class="px-4 py-3 text-slate-500 uppercase text-center">THÁNG</th>
                        <th class="px-4 py-3 text-indigo-600 uppercase text-center bg-indigo-50/30">TỔNG</th>
                        <th class="px-4 py-3 text-emerald-600 uppercase text-center bg-emerald-50/30">ĐẠT</th>
                        <th class="px-4 py-3 text-rose-600 uppercase text-center bg-rose-50/30">FAIL</th>
                        <th class="px-4 py-3 text-slate-600 uppercase text-center">TÀI NGUYÊN</th>
                        <th class="px-4 py-3 text-slate-600 uppercase text-center">TRẠNG THÁI</th>
                        <th class="px-4 py-3 text-slate-600 uppercase text-center">ACTION</th>
                    </tr>
                </thead>
                <tbody id="ana-table-body" class="divide-y divide-slate-100 text-slate-700"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    let sChart = null, pChart = null;
    function renderAnalytics() {
        const db = window.loadMasterDB();
        const search = document.getElementById('anaSearch').value.toLowerCase();
        const data = db.filter(d => d.courseId.toLowerCase().includes(search) || d.groupName.toLowerCase().includes(search)).sort((a,b) => b.timestamp - a.timestamp);
        
        let tTrainee = 0, tPass = 0, tFail = 0;
        data.forEach(i => { tTrainee += parseInt(i.totalTrainees)||0; tPass += parseInt(i.passedTrainees)||0; tFail += parseInt(i.failedTrainees)||0; });

        document.getElementById('ana-total-course').innerText = data.length;
        document.getElementById('ana-total-trainee').innerText = tTrainee;
        document.getElementById('ana-total-pass').innerText = tPass;
        document.getElementById('ana-rate').innerText = tTrainee > 0 ? Math.round((tPass/tTrainee)*100)+'%' : '0%';

        const ctxS = document.getElementById('anaStatusChart').getContext('2d');
        if(sChart) sChart.destroy();
        sChart = new Chart(ctxS, { type:'doughnut', data:{ labels:['Đạt','Fail'], datasets:[{data:[tPass, tFail], backgroundColor:['#10b981','#f43f5e'], borderWidth:4, borderColor:'#fff'}] }, options:{ responsive:true, maintainAspectRatio:false, cutout:'75%', plugins:{legend:{position:'right',labels:{usePointStyle:true,boxWidth:6,font:{size:10,weight:'bold'}}}} } });

        const ctxP = document.getElementById('anaPerfChart').getContext('2d');
        if(pChart) pChart.destroy();
        pChart = new Chart(ctxP, { type:'bar', data:{ labels: data.map(d=>d.courseId), datasets:[{label:'Đạt', data: data.map(d=>d.passedTrainees), backgroundColor:'#10b981', borderRadius:4}, {label:'Fail', data: data.map(d=>d.failedTrainees), backgroundColor:'#f43f5e', borderRadius:4}] }, options:{ responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}}, scales:{y:{beginAtZero:true,border:{display:false},grid:{color:'#f1f5f9'}},x:{grid:{display:false},border:{display:false}}} } });

        document.getElementById('ana-table-body').innerHTML = data.map((i, idx) => {
            const rIdx = db.findIndex(x => x.timestamp === i.timestamp);
            const lDS = i.listLink ? `<a href="${i.listLink}" target="_blank" class="text-emerald-500 mx-1"><i class="fas fa-file-excel"></i></a>` : `<i class="fas fa-file-excel text-slate-200 mx-1"></i>`;
            const lQZ = i.quizLink ? `<a href="${i.quizLink}" target="_blank" class="text-indigo-500 mx-1"><i class="fas fa-poll"></i></a>` : `<i class="fas fa-poll text-slate-200 mx-1"></i>`;
            const lRC = i.recordLink ? `<a href="${i.recordLink}" target="_blank" class="text-blue-400 mx-1"><i class="fas fa-video"></i></a>` : `<i class="fas fa-video text-slate-200 mx-1"></i>`;

            return `<tr class="hover:bg-blue-50/30 transition">
                <td class="px-4 py-3 text-center text-slate-400 font-bold">${idx+1}</td>
                <td class="px-4 py-3 font-black text-slate-800">${i.groupName}</td>
                <td class="px-4 py-3 font-black text-blue-600 uppercase">${i.courseId}</td>
                <td class="px-4 py-3 text-center font-bold text-slate-400 uppercase">Tháng ${i.month}</td>
                <td class="px-4 py-3 text-center font-black text-indigo-600 bg-indigo-50/50">${i.totalTrainees}</td>
                <td class="px-4 py-3 text-center font-black text-emerald-600 bg-emerald-50/50">${i.passedTrainees}</td>
                <td class="px-4 py-3 text-center font-black text-rose-500 bg-rose-50/50">${i.failedTrainees}</td>
                <td class="px-4 py-3 text-center text-sm">${lDS}${lQZ}${lRC}</td>
                <td class="px-4 py-3 text-center"><span class="px-2 py-0.5 rounded-full text-[9px] font-black uppercase ${i.status==='Hoàn thành'?'bg-emerald-100 text-emerald-600':'bg-amber-100 text-amber-600'}">${i.status}</span></td>
                <td class="px-4 py-3 text-center"><i class="fas fa-trash text-rose-400 cursor-pointer hover:scale-125 transition" onclick="window.requestDelete(${rIdx})"></i></td>
            </tr>`;
        }).join('');
    }
    renderAnalytics();
</script>
