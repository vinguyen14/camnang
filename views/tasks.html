<div class="max-w-4xl mx-auto h-full flex flex-col space-y-6">
    <div class="flex justify-between items-center mb-4">
        <h1 class="text-2xl font-black text-slate-800" id="task-title">Quản Lý Công Việc</h1>
        <a href="#courses" class="px-4 py-2 bg-white border rounded-xl text-xs font-bold text-slate-500 hover:bg-slate-50 transition shadow-sm">Quay lại</a>
    </div>

    <!-- TABS -->
    <div class="bg-slate-100 p-1 rounded-xl flex gap-1 mb-2 border">
        <button onclick="openT('b')" id="t-b" class="t-tab active flex-1 py-2 text-sm font-bold rounded-lg text-slate-700 bg-white shadow-sm transition">Trước Khóa</button>
        <button onclick="openT('d')" id="t-d" class="t-tab flex-1 py-2 text-sm font-bold rounded-lg text-slate-500 transition">Trong Khóa</button>
        <button onclick="openT('a')" id="t-a" class="t-tab flex-1 py-2 text-sm font-bold rounded-lg text-slate-500 transition">Sau Khóa</button>
    </div>

    <div class="bg-white border border-slate-200 rounded-[32px] p-8 flex-grow shadow-md overflow-y-auto custom-scrollbar">
        <div id="tc-b" class="tc block space-y-4">
            <h3 class="text-xs font-black text-slate-400 uppercase tracking-widest mb-4">Danh sách đầu việc chuẩn bị</h3>
            <label class="flex items-center gap-3 p-4 bg-slate-50 rounded-2xl cursor-pointer hover:bg-slate-100 transition"><input type="checkbox" class="w-4 h-4 accent-blue-600"><span class="font-bold text-slate-700">Chuẩn bị slide và tài liệu giảng dạy</span></label>
            <label class="flex items-center gap-3 p-4 bg-slate-50 rounded-2xl cursor-pointer hover:bg-slate-100 transition"><input type="checkbox" class="w-4 h-4 accent-blue-600"><span class="font-bold text-slate-700">Lọc danh sách nhân sự mới từ HRM</span></label>
            <label class="flex items-center gap-3 p-4 bg-slate-50 rounded-2xl cursor-pointer hover:bg-slate-100 transition"><input type="checkbox" class="w-4 h-4 accent-blue-600"><span class="font-bold text-slate-700">Tạo group Zalo và gửi mail thư mời</span></label>
        </div>
        
        <div id="tc-a" class="tc hidden space-y-6">
            <div class="p-8 bg-blue-50/50 border-2 border-blue-100 border-dashed rounded-[40px]">
                <h4 class="text-lg font-black text-slate-800 mb-6 flex items-center gap-3"><i class="fas fa-cloud-upload-alt text-blue-500"></i> Nộp Báo Cáo & Đóng Khóa</h4>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                    <div>
                        <label class="text-[10px] font-black text-slate-400 uppercase mb-1 block ml-2">Mã Khóa Nhận Diện</label>
                        <div class="flex gap-2">
                            <input type="text" id="db-prefix" readonly class="w-2/3 bg-slate-100 border border-slate-200 rounded-2xl px-4 py-3 text-xs font-black text-slate-500 outline-none">
                            <input type="text" id="db-suffix" maxlength="2" placeholder="XX" class="w-1/3 border-2 border-blue-200 rounded-2xl px-4 py-3 text-sm font-black text-center focus:border-blue-500 outline-none uppercase">
                        </div>
                    </div>
                    <div><label class="text-[10px] font-black text-slate-400 uppercase mb-1 block ml-2">Trạng Thái</label><select id="db-st" class="w-full border border-slate-200 rounded-2xl px-4 py-3 text-sm font-bold outline-none focus:border-blue-500"><option>Hoàn thành</option><option>Hủy</option></select></div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                    <div><label class="text-[10px] font-black text-slate-400 uppercase mb-1 block ml-2">Ngày Bắt Đầu</label><input type="date" id="db-start" class="w-full border border-slate-200 rounded-2xl px-4 py-3 text-sm font-bold outline-none"></div>
                    <div><label class="text-[10px] font-black text-slate-400 uppercase mb-1 block ml-2">Ngày Kết Thúc</label><input type="date" id="db-finish" class="w-full border border-slate-200 rounded-2xl px-4 py-3 text-sm font-bold outline-none"></div>
                </div>
                <div class="grid grid-cols-3 gap-4 mb-6">
                    <div class="bg-white p-4 rounded-2xl border border-slate-200 text-center"><label class="text-[9px] font-bold text-slate-400 block mb-1">TỔNG HV</label><input type="number" id="db-total" class="w-full text-xl font-black text-slate-800 text-center outline-none"></div>
                    <div class="bg-white p-4 rounded-2xl border border-emerald-200 text-center"><label class="text-[9px] font-bold text-emerald-400 block mb-1">HV ĐẠT</label><input type="number" id="db-pass" class="w-full text-xl font-black text-emerald-600 text-center outline-none"></div>
                    <div class="bg-white p-4 rounded-2xl border border-rose-200 text-center"><label class="text-[9px] font-bold text-rose-400 block mb-1">HV FAIL</label><input type="number" id="db-fail" class="w-full text-xl font-black text-rose-600 text-center outline-none"></div>
                </div>
                <div class="space-y-3 mb-8 px-2">
                    <div class="relative"><i class="fas fa-file-excel absolute left-4 top-3.5 text-emerald-500"></i><input type="text" id="db-l1" placeholder="Link danh sách Spreadsheet..." class="w-full border border-slate-200 rounded-2xl pl-11 pr-4 py-3 text-xs outline-none"></div>
                    <div class="relative"><i class="fas fa-poll absolute left-4 top-3.5 text-indigo-500"></i><input type="text" id="db-l2" placeholder="Link bài Quiz / LMS..." class="w-full border border-slate-200 rounded-2xl pl-11 pr-4 py-3 text-xs outline-none"></div>
                    <div class="relative"><i class="fas fa-video absolute left-4 top-3.5 text-blue-500"></i><input type="text" id="db-l3" placeholder="Link record camera buổi học..." class="w-full border border-slate-200 rounded-2xl pl-11 pr-4 py-3 text-xs outline-none"></div>
                </div>
                <button onclick="saveBaoCao()" class="w-full py-5 bg-slate-900 text-white font-black rounded-[20px] text-xs uppercase tracking-[0.2em] shadow-xl hover:bg-blue-600 transition transform hover:-translate-y-1">Xác nhận nộp báo cáo</button>
            </div>
        </div>
    </div>
</div>

<script>
    const cid = localStorage.getItem('currentCourseId') || 'SPCB';
    const conf = window.AppState.courseConfig.find(c => c.id === cid);
    document.getElementById('db-prefix').value = conf.prefix + "-";

    function openT(id) {
        document.querySelectorAll('.tc').forEach(v => v.classList.add('hidden')); document.getElementById('tc-'+id).classList.remove('hidden');
        document.querySelectorAll('.t-tab').forEach(t => t.className = "t-tab flex-1 py-2 text-sm font-bold rounded-lg text-slate-500 transition");
        document.getElementById('t-'+id).className = "t-tab active flex-1 py-2 text-sm font-bold rounded-lg text-slate-700 bg-white shadow-sm transition";
    }

    function saveBaoCao() {
        const suffix = document.getElementById('db-suffix').value;
        const total = document.getElementById('db-total').value;
        const start = document.getElementById('db-start').value;
        if(!suffix || !total || !start) return alert("Vui lòng điền đủ Mã khóa (XX), Ngày bắt đầu và Số lượng!");
        
        const record = { 
            timestamp: Date.now(), 
            groupName: cid, 
            courseId: (document.getElementById('db-prefix').value + suffix).toUpperCase(), 
            month: new Date(start).getMonth() + 1, 
            status: document.getElementById('db-st').value, 
            startDate: start,
            finishDate: document.getElementById('db-finish').value,
            totalTrainees: total, 
            passedTrainees: document.getElementById('db-pass').value||0, 
            failedTrainees: document.getElementById('db-fail').value||0, 
            listLink: document.getElementById('db-l1').value, 
            quizLink: document.getElementById('db-l2').value, 
            recordLink: document.getElementById('db-l3').value 
        };
        
        let db = window.loadMasterDB(); db.push(record); localStorage.setItem('kv_master_db', JSON.stringify(db));
        window.openModal('successModal');
    }
</script>
