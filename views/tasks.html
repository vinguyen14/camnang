<div class="h-full flex flex-col max-w-4xl mx-auto pb-10">
    <div class="bg-white border border-slate-200 rounded-[40px] p-8 shadow-sm mb-8">
        <div class="flex justify-between items-end mb-4"><span class="text-xs font-black text-slate-400 uppercase tracking-widest">Tiến độ admin</span><span class="text-2xl font-black text-emerald-500" id="pct-text">0%</span></div>
        <div class="w-full bg-slate-100 h-3 rounded-full overflow-hidden shadow-inner"><div id="p-bar" class="bg-emerald-500 h-full transition-all duration-1000" style="width: 0%"></div></div>
    </div>

    <div class="bg-slate-100 p-1.5 rounded-2xl flex gap-1.5 mb-8 border shrink-0">
        <button onclick="openT('b')" id="t-b" class="t-tab active flex-1 py-3 text-sm font-bold rounded-xl text-slate-700 bg-white shadow-sm transition">Trước Khóa</button>
        <button onclick="openT('d')" id="t-d" class="t-tab flex-1 py-3 text-sm font-bold rounded-lg text-slate-500 transition">Trong Khóa</button>
        <button onclick="openT('a')" id="t-a" class="t-tab flex-1 py-3 text-sm font-bold rounded-lg text-slate-500 transition">Sau Khóa & Nộp Báo Cáo</button>
    </div>

    <div class="bg-white border border-slate-200 rounded-[40px] p-10 flex-grow shadow-md overflow-y-auto custom-scrollbar">
        <div id="tc-b" class="tc block space-y-5">
            <h3 class="text-sm font-black text-slate-400 uppercase tracking-widest mb-4">Đầu việc chuẩn bị</h3>
            <label class="flex items-center gap-4 p-5 bg-slate-50 rounded-2xl cursor-pointer hover:bg-slate-100 transition"><input type="checkbox" onchange="updP()" class="w-5 h-5 accent-blue-600"><span class="font-bold text-slate-700">Chuẩn bị slide và tài liệu giảng dạy</span></label>
            <label class="flex items-center gap-4 p-5 bg-slate-50 rounded-2xl cursor-pointer hover:bg-slate-100 transition"><input type="checkbox" onchange="updP()" class="w-5 h-5 accent-blue-600"><span class="font-bold text-slate-700">Lọc danh sách nhân sự mới từ HRM</span></label>
            <label class="flex items-center gap-4 p-5 bg-slate-50 rounded-2xl cursor-pointer hover:bg-slate-100 transition"><input type="checkbox" onchange="updP()" class="w-5 h-5 accent-blue-600"><span class="font-bold text-slate-700">Tạo group Zalo và gửi mail thư mời</span></label>
        </div>
        <div id="tc-d" class="tc hidden space-y-5">
            <h3 class="text-sm font-black text-slate-400 uppercase tracking-widest mb-4">Đầu việc vận hành</h3>
            <label class="flex items-center gap-4 p-5 bg-slate-50 rounded-2xl cursor-pointer hover:bg-slate-100 transition"><input type="checkbox" onchange="updP()" class="w-5 h-5 accent-blue-600"><span class="font-bold text-slate-700">Mở link Meet & Điểm danh đầu giờ</span></label>
            <label class="flex items-center gap-4 p-5 bg-slate-50 rounded-2xl cursor-pointer hover:bg-slate-100 transition"><input type="checkbox" onchange="updP()" class="w-5 h-5 accent-blue-600"><span class="font-bold text-slate-700">Ghi hình (Record) buổi học</span></label>
        </div>
        
        <div id="tc-a" class="tc hidden space-y-8">
            <div class="p-10 bg-blue-50/50 border-2 border-blue-100 border-dashed rounded-[40px]">
                <h4 class="text-xl font-black text-slate-800 mb-8 flex items-center gap-3"><i class="fas fa-cloud-upload-alt text-blue-500"></i> Nộp Báo Cáo & Đóng Khóa</h4>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                    <div>
                        <label class="text-[10px] font-black text-slate-400 uppercase mb-2 block ml-2">Mã Khóa (2 số cuối tự điền)</label>
                        <div class="flex gap-2">
                            <input type="text" id="db-prefix" readonly class="w-2/3 bg-slate-100 border border-slate-200 rounded-2xl px-5 py-4 text-xs font-black text-slate-500">
                            <input type="text" id="db-suffix" maxlength="2" placeholder="XX" class="w-1/3 border-2 border-blue-200 rounded-2xl px-5 py-4 text-sm font-black text-center focus:border-blue-500 outline-none uppercase">
                        </div>
                    </div>
                    <div><label class="text-[10px] font-black text-slate-400 uppercase mb-2 block ml-2">Trạng Thái</label><select id="db-st" class="w-full border border-slate-200 rounded-2xl px-5 py-4 text-sm font-bold outline-none focus:border-blue-500"><option>Hoàn thành</option><option>Hủy</option></select></div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                    <div><label class="text-[10px] font-black text-slate-400 uppercase mb-2 block ml-2">Ngày Bắt Đầu</label><input type="date" id="db-start" class="w-full border rounded-2xl px-5 py-4 text-sm font-bold outline-none"></div>
                    <div><label class="text-[10px] font-black text-slate-400 uppercase mb-2 block ml-2">Ngày Kết Thúc</label><input type="date" id="db-finish" class="w-full border rounded-2xl px-5 py-4 text-sm font-bold outline-none"></div>
                </div>
                <div class="grid grid-cols-3 gap-4 mb-8">
                    <div class="bg-white p-5 rounded-[24px] border border-slate-200 text-center shadow-sm"><label class="text-[9px] font-bold text-slate-400 block mb-2 uppercase">Tổng HV</label><input type="number" id="db-total" class="w-full text-xl font-black text-slate-800 text-center outline-none"></div>
                    <div class="bg-white p-5 rounded-[24px] border border-emerald-200 text-center shadow-sm"><label class="text-[9px] font-bold text-emerald-400 block mb-2 uppercase">HV Đạt</label><input type="number" id="db-pass" class="w-full text-xl font-black text-emerald-600 text-center outline-none"></div>
                    <div class="bg-white p-5 rounded-[24px] border border-rose-200 text-center shadow-sm"><label class="text-[9px] font-bold text-rose-400 block mb-2 uppercase">HV Fail</label><input type="number" id="db-fail" class="w-full text-xl font-black text-rose-600 text-center outline-none"></div>
                </div>
                <div class="space-y-4 mb-10 px-2">
                    <div class="relative"><i class="fas fa-file-excel absolute left-5 top-4.5 text-emerald-500 mt-0.5"></i><input type="text" id="db-l1" placeholder="Link danh sách Spreadsheet..." class="w-full border border-slate-200 rounded-2xl pl-12 pr-5 py-4 text-xs outline-none focus:border-blue-400"></div>
                    <div class="relative"><i class="fas fa-poll absolute left-5 top-4.5 text-indigo-500 mt-0.5"></i><input type="text" id="db-l2" placeholder="Link bài Quiz / LMS..." class="w-full border border-slate-200 rounded-2xl pl-12 pr-5 py-4 text-xs outline-none focus:border-blue-400"></div>
                    <div class="relative"><i class="fas fa-video absolute left-5 top-4.5 text-blue-500 mt-0.5"></i><input type="text" id="db-l3" placeholder="Link record camera buổi học..." class="w-full border border-slate-200 rounded-2xl pl-12 pr-5 py-4 text-xs outline-none focus:border-blue-400"></div>
                </div>
                <button onclick="saveReport()" class="w-full py-5 bg-slate-900 text-white font-black rounded-[24px] text-xs uppercase tracking-[0.2em] shadow-xl hover:bg-blue-600 transition transform hover:-translate-y-1">Xác nhận nộp báo cáo</button>
            </div>
        </div>
    </div>
</div>

<script>
    const tid = localStorage.getItem('currentCourseId') || 'SPCB';
    const tconf = window.courseConfig.find(c => c.id === tid);
    document.getElementById('db-prefix').value = (tconf ? tconf.prefix : '26KV') + "-";

    function openT(id) {
        document.querySelectorAll('.tc').forEach(v => v.classList.add('hidden')); document.getElementById('tc-'+id).classList.remove('hidden');
        document.querySelectorAll('.t-tab').forEach(t => t.className = "t-tab flex-1 py-3 text-sm font-bold rounded-xl text-slate-500 transition");
        document.getElementById('t-'+id).className = "t-tab active flex-1 py-3 text-sm font-bold rounded-xl text-slate-700 bg-white shadow-sm transition";
    }
    function updP() {
        const cbs = document.querySelectorAll('input[type="checkbox"]');
        const done = Array.from(cbs).filter(c => c.checked).length;
        const pct = Math.round((done / cbs.length) * 100);
        document.getElementById('p-bar').style.width = pct + '%';
        document.getElementById('pct-text').innerText = pct + '%';
    }
    function saveReport() {
        const suffix = document.getElementById('db-suffix').value;
        const total = document.getElementById('db-total').value;
        if(!suffix || !total) return alert("Vui lòng nhập đủ Mã khóa (XX) và Số lượng!");
        const record = { timestamp: Date.now(), groupName: tid, courseId: (document.getElementById('db-prefix').value + suffix).toUpperCase(), month: new Date(document.getElementById('db-start').value).getMonth() + 1 || new Date().getMonth() + 1, status: document.getElementById('db-st').value, startDate: document.getElementById('db-start').value, finishDate: document.getElementById('db-finish').value, totalTrainees: total, passedTrainees: document.getElementById('db-pass').value||0, failedTrainees: document.getElementById('db-fail').value||0, listLink: document.getElementById('db-l1').value, quizLink: document.getElementById('db-l2').value, recordLink: document.getElementById('db-l3').value };
        let db = window.loadMasterDB(); db.push(record); localStorage.setItem('kv_master_db', JSON.stringify(db)); window.openModal('successModal');
    }
    updP();
</script>
