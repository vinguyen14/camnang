<div class="h-full flex flex-col max-w-4xl mx-auto pb-10">
    <div class="bg-white border border-slate-200 rounded-[32px] p-6 shadow-sm mb-6 flex justify-between items-center">
        <div class="flex-1 mr-8">
            <div class="flex justify-between items-end mb-2"><span class="text-xs font-bold text-slate-400 uppercase">Tiến độ admin</span><span class="text-lg font-black text-emerald-500" id="pct-text">50%</span></div>
            <div class="w-full bg-slate-100 h-2 rounded-full overflow-hidden"><div id="p-bar" class="bg-emerald-500 h-full transition-all duration-700" style="width: 50%"></div></div>
        </div>
        <a href="#courses" class="px-4 py-2 bg-slate-50 text-slate-400 rounded-xl text-xs font-bold hover:text-slate-600 transition">Quay lại</a>
    </div>

    <div class="bg-slate-100 p-1 rounded-xl flex gap-1 mb-6 border shrink-0">
        <button onclick="openT('b')" id="t-b" class="t-tab active flex-1 py-2 text-sm font-bold rounded-lg text-slate-700 bg-white shadow-sm">Trước Khóa</button>
        <button onclick="openT('d')" id="t-d" class="t-tab flex-1 py-2 text-sm font-bold rounded-lg text-slate-500">Trong Khóa</button>
        <button onclick="openT('a')" id="t-a" class="t-tab flex-1 py-2 text-sm font-bold rounded-lg text-slate-500">Sau Khóa</button>
    </div>

    <div class="bg-white border border-slate-200 rounded-[32px] p-8 flex-grow shadow-sm overflow-y-auto custom-scrollbar">
        <div id="tc-b" class="tc block space-y-4">
            <label class="flex items-center gap-3 p-4 bg-slate-50 rounded-2xl cursor-pointer"><input type="checkbox" onchange="updP()" class="w-4 h-4 accent-blue-600"><span class="font-bold text-slate-700">Chuẩn bị slide và tài liệu</span></label>
            <label class="flex items-center gap-3 p-4 bg-slate-50 rounded-2xl cursor-pointer"><input type="checkbox" onchange="updP()" class="w-4 h-4 accent-blue-600"><span class="font-bold text-slate-700">Lọc danh sách HRM & Gửi Mail</span></label>
        </div>
        <div id="tc-d" class="tc hidden space-y-4">
            <label class="flex items-center gap-3 p-4 bg-slate-50 rounded-2xl cursor-pointer"><input type="checkbox" onchange="updP()" class="w-4 h-4 accent-blue-600"><span class="font-bold text-slate-700">Điểm danh & Record</span></label>
        </div>
        
        <div id="tc-a" class="tc hidden space-y-6">
            <div class="p-6 bg-blue-50/50 border-2 border-blue-100 border-dashed rounded-3xl">
                <h4 class="text-base font-black text-slate-800 mb-6 flex items-center gap-2"><i class="fas fa-cloud-upload-alt text-blue-500"></i> Nộp Báo Cáo & Đóng Khóa</h4>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                    <div>
                        <label class="text-[10px] font-black text-slate-400 uppercase mb-1 block">Mã Khóa Nhận Diện</label>
                        <div class="flex gap-1">
                            <input type="text" id="db-prefix" readonly class="w-2/3 bg-slate-100 border border-slate-200 rounded-xl px-4 py-3 text-xs font-black text-slate-500">
                            <input type="text" id="db-suffix" maxlength="2" placeholder="XX" class="w-1/3 border-2 border-blue-300 rounded-xl px-4 py-3 text-xs font-black text-center focus:border-blue-600 outline-none uppercase">
                        </div>
                    </div>
                    <div><label class="text-[10px] font-black text-slate-400 uppercase mb-1 block">Trạng Thái</label><select id="db-st" class="w-full border border-slate-200 rounded-xl px-4 py-3 text-xs font-bold outline-none focus:border-blue-500"><option>Hoàn thành</option><option>Hủy</option></select></div>
                </div>
                <div class="grid grid-cols-2 gap-4 mb-4">
                    <div><label class="text-[10px] font-black text-slate-400 uppercase mb-1 block">Bắt Đầu</label><input type="date" id="db-start" class="w-full border rounded-xl px-4 py-3 text-xs font-bold outline-none"></div>
                    <div><label class="text-[10px] font-black text-slate-400 uppercase mb-1 block">Kết Thúc</label><input type="date" id="db-finish" class="w-full border rounded-xl px-4 py-3 text-xs font-bold outline-none"></div>
                </div>
                <div class="grid grid-cols-3 gap-3 mb-6">
                    <div class="bg-white p-3 rounded-xl border border-slate-200 text-center"><label class="text-[9px] font-bold text-slate-400 block mb-1">TỔNG HV</label><input type="number" id="db-total" class="w-full text-lg font-black text-slate-800 text-center outline-none"></div>
                    <div class="bg-white p-3 rounded-xl border border-emerald-200 text-center"><label class="text-[9px] font-bold text-emerald-400 block mb-1">HV ĐẠT</label><input type="number" id="db-pass" class="w-full text-lg font-black text-emerald-600 text-center outline-none"></div>
                    <div class="bg-white p-3 rounded-xl border border-rose-200 text-center"><label class="text-[9px] font-bold text-rose-400 block mb-1">HV FAIL</label><input type="number" id="db-fail" class="w-full text-lg font-black text-rose-600 text-center outline-none"></div>
                </div>
                <div class="space-y-3 mb-8">
                    <div class="relative"><i class="fas fa-file-excel absolute left-4 top-3.5 text-emerald-500"></i><input type="text" id="db-l1" placeholder="Link danh sách Spreadsheet..." class="w-full border border-slate-200 rounded-xl pl-10 pr-4 py-3 text-xs outline-none"></div>
                    <div class="relative"><i class="fas fa-poll absolute left-4 top-3.5 text-indigo-500"></i><input type="text" id="db-l2" placeholder="Link bài Quiz / LMS..." class="w-full border border-slate-200 rounded-xl pl-10 pr-4 py-3 text-xs outline-none"></div>
                    <div class="relative"><i class="fas fa-video absolute left-4 top-3.5 text-blue-500"></i><input type="text" id="db-l3" placeholder="Link record camera buổi học..." class="w-full border border-slate-200 rounded-xl pl-10 pr-4 py-3 text-xs outline-none"></div>
                </div>
                <button onclick="saveBaoCao()" class="w-full py-4 bg-slate-900 text-white font-black rounded-2xl text-xs uppercase tracking-widest shadow-xl hover:bg-blue-600 transition transform hover:-translate-y-1">Xác nhận nộp báo cáo</button>
            </div>
        </div>
    </div>
</div>

<script>
    const tid = localStorage.getItem('currentCourseId') || 'SPCB';
    const tconf = window.courseConfig.find(c => c.id === tid);
    document.getElementById('db-prefix').value = tconf.prefix + "-";

    function openT(id) {
        document.querySelectorAll('.tc').forEach(v => v.classList.add('hidden')); document.getElementById('tc-'+id).classList.remove('hidden');
        document.querySelectorAll('.t-tab').forEach(t => t.className = "t-tab flex-1 py-2 text-sm font-bold rounded-lg text-slate-500 transition");
        document.getElementById('t-'+id).className = "t-tab active flex-1 py-2 text-sm font-bold rounded-lg text-slate-700 bg-white shadow-sm transition";
    }
    function updP() {
        const cbs = document.querySelectorAll('input[type="checkbox"]');
        const done = Array.from(cbs).filter(c => c.checked).length;
        const pct = Math.round((done / cbs.length) * 100);
        document.getElementById('p-bar').style.width = pct + '%';
        document.getElementById('pct-text').innerText = pct + '%';
    }
    function saveBaoCao() {
        const suffix = document.getElementById('db-suffix').value;
        const total = document.getElementById('db-total').value;
        if(!suffix || !total) return alert("Vui lòng nhập đủ Mã khóa (XX) và Số lượng!");

        const record = {
            timestamp: Date.now(), groupName: tid, courseId: (tconf.prefix + "-" + suffix).toUpperCase(),
            month: new Date(document.getElementById('db-start').value).getMonth() + 1 || new Date().getMonth() + 1,
            status: document.getElementById('db-st').value, startDate: document.getElementById('db-start').value, finishDate: document.getElementById('db-finish').value,
            totalTrainees: total, passedTrainees: document.getElementById('db-pass').value||0, failedTrainees: document.getElementById('db-fail').value||0,
            listLink: document.getElementById('db-l1').value, quizLink: document.getElementById('db-l2').value, recordLink: document.getElementById('db-l3').value
        };

        let db = window.loadMasterDB(); db.push(record);
        localStorage.setItem('kv_master_db', JSON.stringify(db));
        window.openModal('successModal');
    }
    updP();
</script>
