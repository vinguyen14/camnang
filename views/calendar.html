<div class="h-full flex flex-col max-w-6xl mx-auto">
    <div class="bg-slate-100 p-1 rounded-xl flex gap-1 mb-6 border border-slate-200 shrink-0">
        <button onclick="openCalTab('roadmap-flow')" id="tab-roadmap-flow" class="cal-tab active flex-1 py-2.5 text-sm font-bold rounded-lg text-slate-700 bg-white shadow-sm transition">Roadmap</button>
        <button onclick="openCalTab('year-cal')" id="tab-year-cal" class="cal-tab flex-1 py-2.5 text-sm font-bold rounded-lg text-slate-500 transition">Lịch Năm</button>
        <button onclick="openCalTab('notif-tab')" id="tab-notif-tab" class="cal-tab flex-1 py-2.5 text-sm font-bold rounded-lg text-slate-500 transition">Thông Báo</button>
    </div>

    <div class="flex-grow overflow-hidden relative">
        <!-- TAB 1: ROADMAP BOX -->
        <div id="roadmap-flow" class="cal-content h-full overflow-y-auto custom-scrollbar">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8 p-4">
                <!-- Direct Sales Box Flow -->
                <div class="space-y-4">
                    <h3 class="text-center font-black text-blue-600 uppercase text-xs tracking-widest mb-4">Direct Sales</h3>
                    <div class="p-4 bg-white border-2 border-blue-100 rounded-2xl shadow-sm text-center relative">
                        <p class="text-xs font-black text-blue-500 mb-1">Tháng 1</p>
                        <p class="text-sm font-bold text-slate-700">Hội Nhập & Sản phẩm B1-B3</p>
                        <div class="absolute -bottom-4 left-1/2 -translate-x-1/2 text-blue-200"><i class="fas fa-chevron-down"></i></div>
                    </div>
                    <div class="p-4 bg-white border-2 border-blue-100 rounded-2xl shadow-sm text-center relative mt-6">
                        <p class="text-xs font-black text-blue-500 mb-1">Tháng 2</p>
                        <p class="text-sm font-bold text-slate-700">Kỹ năng Sales & HĐĐT</p>
                        <div class="absolute -bottom-4 left-1/2 -translate-x-1/2 text-blue-200"><i class="fas fa-chevron-down"></i></div>
                    </div>
                </div>
                <!-- Telesales Box Flow -->
                <div class="space-y-4">
                    <h3 class="text-center font-black text-teal-600 uppercase text-xs tracking-widest mb-4">Telesales</h3>
                    <div class="p-4 bg-white border-2 border-teal-100 rounded-2xl shadow-sm text-center relative">
                        <p class="text-xs font-black text-teal-500 mb-1">Tháng 1</p>
                        <p class="text-sm font-bold text-slate-700">Call Scripts & Sản phẩm</p>
                        <div class="absolute -bottom-4 left-1/2 -translate-x-1/2 text-teal-200"><i class="fas fa-chevron-down"></i></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- TAB 2: LỊCH 2026 CHUẨN (Dữ liệu gốc của bạn) -->
        <div id="year-cal" class="cal-content hidden h-full overflow-y-auto custom-scrollbar">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6" id="calendar-grid"></div>
        </div>

        <!-- TAB 3: THÔNG BÁO -->
        <div id="notif-tab" class="cal-content hidden h-full space-y-3">
            <div class="p-4 bg-white border border-slate-200 rounded-2xl flex justify-between items-center" id="notif-1">
                <div><p class="text-sm font-bold">Khóa SPCB sắp bắt đầu</p><p class="text-xs text-slate-400">2026-01-14</p></div>
                <button onclick="markAsRead('notif-1', this)" class="text-xs font-bold text-blue-600 px-3 py-1 border border-blue-200 rounded-lg">Đánh dấu đã đọc</button>
            </div>
        </div>
    </div>
</div>

<script>
    function openCalTab(id) {
        document.querySelectorAll('.cal-content').forEach(el => el.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
        document.querySelectorAll('.cal-tab').forEach(el => el.className = "cal-tab flex-1 py-2.5 text-sm font-bold rounded-lg text-slate-500 transition");
        document.getElementById('tab-' + id).className = "cal-tab active flex-1 py-2.5 text-sm font-bold rounded-lg text-slate-700 bg-white shadow-sm transition";
    }
    function markAsRead(id, btn) {
        document.getElementById(id).style.opacity = '0.5';
        btn.parentElement.innerHTML = `<span class="text-emerald-500 text-xs font-bold"><i class="fas fa-check-circle"></i> Đã đọc</span>`;
    }
    // Logic render lịch 2026 (dựa trên source code gốc của bạn)
    function renderCal() { /* ...logic sinh lịch tháng... */ }
    renderCal();
</script>
