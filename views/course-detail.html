<div class="h-full flex flex-col max-w-6xl mx-auto pb-10">
    <div class="flex justify-between items-start mb-6">
        <div><h1 class="text-3xl font-black text-slate-800 tracking-tight" id="cd-title">...</h1><p class="text-xs font-mono text-slate-400 mt-1" id="cd-id">Mã khóa: ...</p></div>
        <a href="#courses" class="px-4 py-2 bg-white border border-slate-200 rounded-xl text-xs font-bold text-slate-500 hover:bg-slate-50 transition shadow-sm">Quay lại</a>
    </div>

    <div class="bg-slate-100 p-1 rounded-xl flex gap-1 mb-6 border shrink-0">
        <button onclick="openTab('script')" id="tab-script" class="c-tab active flex-1 py-2.5 text-sm font-bold rounded-lg text-slate-700 bg-white shadow-sm transition">Kịch Bản</button>
        <button onclick="openTab('docs')" id="tab-docs" class="c-tab flex-1 py-2 text-sm font-bold rounded-lg text-slate-500 transition">Tài Liệu</button>
        <button onclick="openTab('info')" id="tab-info" class="c-tab flex-1 py-2 text-sm font-bold rounded-lg text-slate-500 transition">Thông Tin</button>
    </div>

    <div class="flex-grow bg-white border border-slate-200 rounded-[40px] shadow-sm overflow-hidden flex flex-col relative">
        <div id="view-script" class="c-view h-full flex flex-col md:flex-row min-h-0">
            <div class="w-full md:w-64 border-r border-slate-100 p-4 space-y-1 overflow-y-auto custom-scrollbar bg-slate-50/50" id="vertical-menu"></div>
            <div class="flex-1 p-10 overflow-y-auto custom-scrollbar bg-white" id="script-body"></div>
        </div>
        <div id="view-docs" class="c-view hidden h-full p-10 overflow-y-auto"><div class="grid grid-cols-1 md:grid-cols-2 gap-6" id="docs-area"></div></div>
        <div id="view-info" class="c-view hidden h-full p-10 overflow-y-auto" id="info-area"></div>
    </div>
</div>

<script>
    const cid = localStorage.getItem('currentCourseId') || 'SPCB';
    const conf = window.courseConfig.find(c => c.id === cid);
    document.getElementById('cd-title').innerText = conf.title;
    document.getElementById('cd-id').innerText = `Mã chuẩn: ${conf.prefix}XX`;

    const db = {
        'SPCB': {
            menu: ['Chào mừng Group Zalo', 'Thứ 2 (Gửi Lịch)', 'Thứ 3 (Buổi 1)', 'Thứ 4 (Buổi 2)', 'Thứ 5 (Buổi 3)', 'Thứ 6 (TEST)'],
            content: [
                `<h3 class="text-xl font-bold mb-6">Chào mừng Group Zalo (10:00 Sáng CN)</h3><div class="space-y-4"><div class="p-5 bg-slate-50 rounded-2xl border relative"><button onclick="copy(this)" class="absolute top-4 right-4 text-[10px] font-black bg-white px-3 py-1 border rounded-lg">COPY</button><pre class="text-[13px] font-sans whitespace-pre-wrap">Chào mừng các bạn tới Group Zalo Đào tạo KiotViet</pre></div><div class="p-5 bg-blue-50 rounded-2xl border border-blue-100 relative"><button onclick="copy(this)" class="absolute top-4 right-4 text-[10px] font-black bg-white px-3 py-1 border rounded-lg text-blue-600">COPY</button><pre class="text-[13px] font-sans font-bold whitespace-pre-wrap text-blue-800">Link đăng ký trải nghiệm phần mềm KiotViet:\nhttps://www.kiotviet.vn/?refcode=3670</pre></div></div>`,
                `<h3 class="text-xl font-bold mb-6">Thứ 2: Nhắc lịch học</h3><div class="p-5 bg-slate-50 rounded-2xl border relative"><button onclick="copy(this)" class="absolute top-4 right-4 text-[10px] font-black bg-white px-3 py-1 border rounded-lg">COPY</button><pre class="text-[13px] font-sans whitespace-pre-wrap">Chào mọi người @All,\nTừ sáng mai Vi đồng hành cùng mọi người học SPCB 3 buổi (T3-T4-T5).\nThời gian: 8:30 – 10:30am\nLink Meet: https://meet.google.com/sxr-hnuk-fob</pre></div>`,
                `<h3 class="text-xl font-bold mb-6">Thứ 3: Buổi 1</h3><div class="p-5 bg-blue-50 border border-blue-100 rounded-2xl relative"><button onclick="copy(this)" class="absolute top-4 right-4 text-[10px] font-black bg-white px-3 py-1 border rounded-lg">COPY</button><pre class="text-[13px] font-sans whitespace-pre-wrap">NỘI DUNG ĐÀO TẠO SẢN PHẨM - TỔNG QUAN KHÓA HỌC + 6 BƯỚC DEMO CƠ BẢN\nNội dung học Buổi 1: Đào tạo Sản phẩm Cơ bản 01</pre></div>`
            ],
            docs: [{t:'Slide B1', l:'https://kiotvietlnd.github.io/slides/san-pham-retail'}, {t:'Playlist KH', l:'https://www.youtube.com/playlist?list=PLjB-7CLwd9mFRlvz4U4FW8HJfMLpBgaMa'}]
        },
        'KV1': {
            menu: ['Gửi Mail đầu tháng', 'Truyền thông Group', 'Kết quả Test L1'],
            content: [
                `<h3 class="text-xl font-bold mb-6">Mail Đầu Tháng (Lọc HRM)</h3><div class="p-5 bg-indigo-50 border border-indigo-100 rounded-2xl relative"><button onclick="copy(this)" class="absolute top-4 right-4 text-[10px] font-black bg-white px-3 py-1 border rounded-lg shadow-sm">COPY MAIL</button><pre class="text-[13px] font-sans whitespace-pre-wrap">Dear anh/chị,\nLnD gửi thông tin Chương trình Test KV1...</pre></div>`
            ],
            docs: [{t:'Thư viện KV1', l:'https://kiotvietlnd.github.io/elearning/khoa-hoc-sales/dao-tao-chuyen-nganh-retail'}]
        },
        'TAX': {
            menu: ['Mail Mời Học', 'Chat Nhắc T6', 'Hối thúc LMS'],
            content: [
                `<h3 class="text-xl font-bold mb-6">Mail Mời Học HĐĐT</h3><p class="p-10 text-center text-slate-400 italic">Vui lòng nộp báo cáo ở tab "Sau khóa" để tự động gen kịch bản này.</p>`
            ],
            docs: [{t:'Slide HĐĐT', l:'https://www.canva.com/design/DAHAO9by6Uc/DbIkB7psM39Jx0d8BCmGgA/edit'}]
        }
    };

    const myDb = db[cid] || db['SPCB'];
    document.getElementById('vertical-menu').innerHTML = myDb.menu.map((m,i) => `<button onclick="showScript(${i})" class="v-btn w-full text-left px-4 py-3.5 rounded-2xl text-[13px] font-bold ${i===0?'bg-white text-blue-600 shadow-sm border border-blue-50':'text-slate-500 hover:bg-white'} transition mb-1">${m}</button>`).join('');
    document.getElementById('script-body').innerHTML = myDb.content[0] || '<p class="text-slate-400 italic">Dữ liệu đang được cập nhật...</p>';
    document.getElementById('docs-area').innerHTML = myDb.docs.map(d => `<div class="p-6 bg-slate-50 border rounded-[24px] hover:shadow-md transition"><b>${d.t}</b><p class="text-blue-500 text-[11px] truncate my-3">${d.l}</p><a href="${d.l}" target="_blank" class="text-xs font-black text-blue-600 bg-white px-4 py-2 rounded-xl border border-blue-100 shadow-sm inline-block">MỞ TÀI LIỆU <i class="fas fa-external-link-alt ml-2"></i></a></div>`).join('');
    document.getElementById('info-area').innerHTML = `<div class="p-10 bg-slate-50 rounded-[40px] border border-slate-100"><h3 class="text-lg font-black text-slate-800 mb-4">Chi tiết mô tả</h3><p class="text-slate-600 leading-relaxed font-medium">${conf.desc}</p></div>`;

    function showScript(i) {
        document.getElementById('script-body').innerHTML = myDb.content[i] || '<p class="text-slate-400 italic">Nội dung chưa cập nhật.</p>';
        document.querySelectorAll('.v-btn').forEach((btn,idx) => btn.className = `v-btn w-full text-left px-4 py-3.5 rounded-2xl text-[13px] font-bold ${i===idx?'bg-white text-blue-600 shadow-sm border border-blue-50':'text-slate-500 hover:bg-white'} transition mb-1`);
    }
    function openTab(id) {
        document.querySelectorAll('.c-view').forEach(v => v.classList.add('hidden')); document.getElementById('view-'+id).classList.remove('hidden');
        document.querySelectorAll('.c-tab').forEach(t => t.className = "c-tab flex-1 py-2.5 text-sm font-bold rounded-lg text-slate-500 transition");
        document.getElementById('tab-'+id).className = "c-tab active flex-1 py-2.5 text-sm font-bold rounded-lg text-slate-700 bg-white shadow-sm transition";
    }
    window.copy = btn => { const t = btn.nextElementSibling.innerText; navigator.clipboard.writeText(t).then(() => { const old = btn.innerText; btn.innerText='COPIED!'; btn.classList.add('text-emerald-500'); setTimeout(()=>{btn.innerText=old; btn.classList.remove('text-emerald-500');}, 1500); }); };
</script>
