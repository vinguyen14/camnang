<div class="max-w-6xl mx-auto h-full flex flex-col">
    <div class="flex justify-between items-start mb-4">
        <h1 class="text-2xl font-black text-slate-800" id="cd-title">...</h1>
        <a href="#courses" class="text-xs font-bold text-slate-500 border border-slate-200 px-3 py-1 rounded-lg">Quay lại</a>
    </div>

    <div class="bg-slate-100 p-1 rounded-xl flex gap-1 mb-6 border border-slate-200">
        <button onclick="openCourseTab('script')" id="tab-script" class="course-tab active flex-1 py-2 text-sm font-bold rounded-lg text-slate-700 bg-white shadow-sm">Kịch Bản</button>
        <button onclick="openCourseTab('docs')" id="tab-docs" class="course-tab flex-1 py-2 text-sm font-bold rounded-lg text-slate-500">Tài Liệu</button>
        <button onclick="openCourseTab('info')" id="tab-info" class="course-tab flex-1 py-2 text-sm font-bold rounded-lg text-slate-500">Thông Tin</button>
    </div>

    <div class="flex-grow overflow-hidden bg-white border border-slate-200 rounded-2xl p-6 shadow-sm relative">
        <div id="course-script" class="course-content h-full flex gap-6">
            <div class="w-56 shrink-0 border-r border-slate-100 pr-4 space-y-1" id="vertical-menu"></div>
            <div class="flex-1 overflow-y-auto custom-scrollbar" id="script-body"></div>
        </div>
        <div id="course-docs" class="course-content hidden h-full overflow-y-auto grid grid-cols-2 gap-4"></div>
        <div id="course-info" class="course-content hidden h-full space-y-4 text-sm font-medium text-slate-600">
            <div class="p-4 bg-slate-50 rounded-xl">Mã khóa: <b class="text-slate-800 font-mono" id="info-id"></b></div>
            <div class="p-4 bg-slate-50 rounded-xl">Mô tả: <p id="info-desc"></p></div>
        </div>
    </div>
</div>

<script>
    const currentId = localStorage.getItem('currentCourseId') || 'SPCB';
    const config = window.courseConfig.find(c => c.id === currentId);
    document.getElementById('cd-title').innerText = config.title;
    document.getElementById('info-id').innerText = config.prefix + "XX";
    document.getElementById('info-desc').innerText = config.desc;

    function openCourseTab(id) {
        document.querySelectorAll('.course-content').forEach(el => el.classList.add('hidden'));
        document.getElementById(`course-${id}`).classList.remove('hidden');
        document.querySelectorAll('.course-tab').forEach(el => el.className = "course-tab flex-1 py-2 text-sm font-bold rounded-lg text-slate-500");
        document.getElementById(`tab-${id}`).className = "course-tab active flex-1 py-2 text-sm font-bold rounded-lg text-slate-700 bg-white shadow-sm";
    }
</script>
