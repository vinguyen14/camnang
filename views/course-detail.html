    function showScript(i) {
        document.getElementById('script-body').innerHTML = myDb.content[i] || '<p class="text-slate-400 italic">Nội dung đang cập nhật...</p>';
        document.querySelectorAll('.v-btn').forEach((btn, idx) => btn.className = `v-btn w-full text-left px-4 py-3 rounded-xl text-xs font-bold ${i===idx?'bg-blue-50 text-blue-600 shadow-sm':'text-slate-500 hover:bg-slate-50'} transition mb-1`);
    }

    // Hàm chuyển Tab ngang chính
    function openTab(id) {
        document.querySelectorAll('.c-view').forEach(v => v.classList.add('hidden')); 
        document.getElementById(`view-${id}`).classList.remove('hidden');
        document.querySelectorAll('.c-tab').forEach(t => t.className = "c-tab flex-1 py-2 text-sm font-bold rounded-lg text-slate-500 transition");
        document.getElementById(`tab-${id}`).className = "c-tab active flex-1 py-2 text-sm font-bold rounded-lg text-slate-700 bg-white shadow-sm transition";
    }

    // Hàm copy xử lý cho nút
    window.copyPre = btn => { 
        const t = btn.nextElementSibling.innerText; 
        navigator.clipboard.writeText(t).then(() => { 
            const old = btn.innerText; btn.innerText='Đã Copy!'; 
            setTimeout(()=>btn.innerText=old, 1500); 
        }); 
    };
</script>
