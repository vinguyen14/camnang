                       <div class="p-5 bg-slate-50 border border-slate-200 rounded-xl relative mb-4"><button onclick="copyText(this)" class="absolute top-4 right-4 text-[10px] font-bold bg-white px-3 py-1 rounded shadow-sm">Copy</button><pre class="text-[13px] text-slate-700 font-medium whitespace-pre-wrap pr-16 font-sans"><b class="uppercase text-sm text-blue-600">NỘI DUNG ĐÀO TẠO SẢN PHẨM - NHỮNG CÂU HỎI THƯỜNG GẶP\nNội dung học Buổi 2: Đào tạo Sản phẩm Cơ bản 02</b>\n---------------------------------\nLưu ý: Dành 2 phút xem hướng dẫn LMS... Hoàn thành khóa học trước 12h trưa nay nhé!</pre></div>

            },
            docs: [

        'KV1': {
            menu: [ { id: 'k1', title: 'Mail Đầu Tháng', active: true }, { id: 'k2', title: 'Nhắc nhở Zalo' }, { id: 'k3', title: 'Mail Test L1' }, { id: 'k4', title: 'Mail Test L2' } ],
            content: {
                'k1': `<h3 class="text-lg font-bold text-slate-800 mb-4">Gửi Mail Đầu Tháng (Lọc HRM)</h3>
                       <div class="p-5 bg-slate-50 border border-slate-200 rounded-xl relative"><button onclick="copyText(this)" class="absolute top-4 right-4 text-[10px] font-bold bg-white px-3 py-1 rounded shadow-sm">Copy</button><pre class="text-[13px] text-slate-700 font-medium whitespace-pre-wrap pr-16 font-sans">Dear anh/chị,\nTeam LnD gửi thông tin chi tiết về Chương trình Đào tạo và Test Sản phẩm KV1 dành cho nhân viên sales gia nhập sau tháng đầu tiên.\n1. Nội dung: Tính năng KV1.\n2. Link: https://daotao.kiotviet.vn/khoa-hoc/sales-dao-tao-san-pham-retail-kv1/\n3. Tỉ lệ đạt: 80% (40 câu / 60 phút)\nGroup chat Test SP KV1 03/2026</pre></div>`,
                'k2': `<h3 class="text-lg font-bold text-slate-800 mb-4">Truyền thông Group Zalo</h3>

                'k3': `<h3 class="text-lg font-bold text-slate-800 mb-4">Thông báo Kết quả Test Lần 1</h3>
                       <div class="p-5 bg-orange-50 border border-orange-200 rounded-xl relative"><button onclick="copyText(this)" class="absolute top-4 right-4 text-[10px] font-bold bg-white px-3 py-1 rounded shadow-sm text-orange-600">Copy</button><pre class="text-[13px] text-orange-800 font-medium whitespace-pre-wrap pr-16 font-sans">Dear các bạn,\nTeam LnD gửi kết quả bài kiểm tra KV1 lần 1 và thông báo lịch test lần 2 với trường hợp Fail/ Chưa test.\nHạn chót Test Lần 2: 16:00 Thứ Tư.</pre></div>`,
                'k4': `<h3 class="text-lg font-bold text-slate-800 mb-4">Kết quả Final Test Lần 2</h3>

                <p class="text-sm font-bold text-slate-800 mb-1">${d.title}</p>
                <p class="text-[10px] text-blue-500 truncate mb-3">${d.link}</p>
                <a href="${d.link}" target="_blank" class="text-xs font-bold text-slate-500 hover:text-blue-600 border border-slate-200 bg-white px-4 py-1.5 rounded-md inline-block shadow-sm">Truy cập</a>
            </div>`;
    });
    document.getElementById('docs-content-area').innerHTML = docsHTML;

    // Function switch kịch bản
    function showSub(id) {
        document.querySelectorAll('.sub-content').forEach(el => el.classList.add('hidden'));
        document.getElementById(`content-${id}`).classList.remove('hidden');
        document.querySelectorAll('.sub-btn').forEach(el => el.className = "sub-btn w-full text-left px-4 py-3 rounded-xl text-[13px] font-bold text-slate-600 hover:bg-slate-50 transition mb-1");
        document.getElementById(`sub-${id}`).className = "sub-btn active w-full text-left px-4 py-3 rounded-xl text-[13px] font-bold bg-blue-50 text-blue-600 transition mb-1";
    }

    // Function riêng cho TAX
    window.genTax = function() {
        const d = document.getElementById('tax-d').value;
        const m = document.getElementById('tax-m').value;
        if(!d) return;
        const dateObj = new Date(d);
        const dayStr = `${dateObj.getDate().toString().padStart(2,'0')}/${(dateObj.getMonth()+1).toString().padStart(2,'0')}`;
        document.getElementById('tax-out').innerText = `Hi @all, sáng nay chúng ta có lịch học HĐĐT nhé!\nThời gian học: 09:00 - 12:00, Thứ 6 (${dayStr})\nLink tham gia: ${m}\nCác bạn tham gia điền giúp mình form điểm danh nhé.`;
    };
</script>
