<div class="h-full flex flex-col max-w-5xl mx-auto">
    <div class="bg-slate-100 p-1 rounded-xl flex gap-1 mb-6 border border-slate-200 shrink-0">
        <button onclick="openToolTab('email-search')" id="tab-email-search" class="tool-tab active flex-1 py-2.5 text-sm font-bold rounded-lg text-slate-700 bg-white shadow-sm transition"><i class="far fa-envelope mr-2"></i> Tra Cứu Email</button>
        <button onclick="openToolTab('email-filter')" id="tab-email-filter" class="tool-tab flex-1 py-2.5 text-sm font-bold rounded-lg text-slate-500 hover:text-slate-700 transition"><i class="fas fa-filter mr-2"></i> Lọc Email</button>
        <button onclick="openToolTab('attendance')" id="tab-attendance" class="tool-tab flex-1 py-2.5 text-sm font-bold rounded-lg text-slate-500 hover:text-slate-700 transition"><i class="fas fa-user-check mr-2"></i> Điểm Danh</button>
    </div>

    <div class="bg-white border border-slate-200 rounded-[24px] p-6 flex-grow overflow-hidden flex flex-col relative shadow-sm">
        <!-- TAB 1: TRA CỨU -->
        <div id="email-search" class="tool-content h-full flex flex-col">
            <h3 class="text-base font-black text-slate-800 mb-4">Tra cứu & Sao chép Email Quản lý & Admin</h3>
            <div class="flex flex-col md:flex-row justify-between items-center mb-4 gap-4 shrink-0">
                <div class="relative w-full md:w-1/2">
                    <i class="fas fa-search absolute left-4 top-3 text-slate-400"></i>
                    <input type="text" id="emailSearchInput" oninput="filterEmailTable()" placeholder="Nhập tên hoặc phòng ban (VD: DSCTO, HN...)" class="w-full bg-slate-50 border border-slate-200 rounded-xl pl-11 pr-4 py-2.5 text-sm outline-none focus:border-blue-400">
                </div>
                <button id="copySelectedBtn" onclick="copySelectedEmails()" class="w-full md:w-auto px-6 py-2.5 bg-slate-900 hover:bg-slate-800 text-white rounded-xl font-bold text-sm transition shadow-md flex items-center justify-center gap-2">
                    Copy Email Đã Chọn <span id="selectedCount" class="bg-white text-slate-900 text-[10px] font-black px-2 py-0.5 rounded-md ml-1 hidden">0</span>
                </button>
            </div>
            <div class="border border-slate-200 rounded-xl overflow-hidden flex-grow flex flex-col">
                <div class="overflow-y-auto custom-scrollbar flex-grow p-1">
                    <table class="min-w-full text-left text-[12px]">
                        <thead class="bg-slate-50 sticky top-0 z-10 border-b border-slate-100">
                            <tr>
                                <th class="px-3 py-2 text-center w-10"><input type="checkbox" id="selectAllCheckbox" onchange="toggleSelectAll(this)" class="w-3.5 h-3.5 accent-blue-600"></th>
                                <th class="px-3 py-2 font-bold text-slate-500 uppercase">Họ Tên</th>
                                <th class="px-3 py-2 font-bold text-slate-500 uppercase">Phòng Ban</th>
                                <th class="px-3 py-2 font-bold text-slate-500 uppercase">Email</th>
                            </tr>
                        </thead>
                        <tbody id="emailTableBody" class="divide-y divide-slate-50 text-slate-700 font-medium"></tbody>
                    </table>
                </div>
            </div>
        </div>
        <!-- TAB 2 & 3: Lọc & Điểm danh (Logic giữ nguyên) -->
        <div id="email-filter" class="tool-content hidden h-full flex flex-col">
            <h3 class="text-base font-black text-slate-800 mb-4">Lọc Email Google Chat</h3>
            <textarea id="mod-input" class="w-full h-40 bg-slate-50 border border-slate-200 rounded-xl p-4 text-sm mb-4 outline-none resize-none" placeholder="Dán danh sách email thô..."></textarea>
            <button onclick="processModuleEmails()" class="w-full py-3 bg-blue-600 text-white rounded-xl font-bold mb-4">LÀM SẠCH DỮ LIỆU</button>
            <textarea id="mod-output" readonly class="w-full flex-grow bg-blue-50/30 border border-blue-100 rounded-xl p-4 text-sm font-bold text-blue-700 outline-none resize-none"></textarea>
        </div>
        <div id="attendance" class="tool-content hidden h-full flex flex-col">
            <h3 class="text-base font-black text-slate-800 mb-4">Điểm danh AI</h3>
            <div class="grid grid-cols-2 gap-4 h-full">
                <textarea id="input-roster" oninput="loadRoster()" class="h-full bg-slate-50 border rounded-xl p-4 text-sm resize-none" placeholder="Dán DS Gốc..."></textarea>
                <div class="flex flex-col">
                    <textarea id="input-meet" class="flex-grow bg-slate-50 border rounded-xl p-4 text-sm resize-none mb-4" placeholder="Dán DS Meet..."></textarea>
                    <button onclick="scanAttendance()" class="w-full py-3 bg-emerald-500 text-white rounded-xl font-bold">QUÉT ĐIỂM DANH</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const employeeData = [
        { role: 'Manager', dept: 'Administration', name: 'Nguyễn Thúy An', email: 'an.nt@kiotviet.com', code: 'SG001' },
        { role: 'Manager', dept: 'Administration', name: 'Phùng Thị Dung', email: 'dungphung@kiotviet.com', code: 'HN004' },
        { role: 'Manager', dept: 'BOD', name: 'Đỗ Tuấn Anh', email: 'tuananh@kiotviet.com', code: 'HN226' },
        { role: 'Manager', dept: 'BOD', name: 'Trần Nguyên Hạo', email: 'hao@kiotviet.com', code: 'HN001' }
        // (Thêm các nhân sự khác vào đây...)
    ];

    function openToolTab(tabId) {
        document.querySelectorAll('.tool-content').forEach(el => el.classList.add('hidden'));
        document.getElementById(tabId).classList.remove('hidden');
        document.querySelectorAll('.tool-tab').forEach(el => el.className = "tool-tab flex-1 py-2.5 text-sm font-bold rounded-lg text-slate-500 hover:text-slate-700 transition");
        document.getElementById('tab-' + tabId).className = "tool-tab active flex-1 py-2.5 text-sm font-bold rounded-lg text-slate-700 bg-white shadow-sm transition";
    }

    let selectedEmails = new Set();
    function renderEmailTable(data) {
        const tbody = document.getElementById('emailTableBody'); tbody.innerHTML = '';
        data.forEach(emp => {
            const isChecked = selectedEmails.has(emp.email);
            tbody.innerHTML += `<tr><td class="px-3 py-2 text-center"><input type="checkbox" data-email="${emp.email}" ${isChecked?'checked':''} onchange="toggleSelect(this)"></td><td class="px-3 py-2 font-bold">${emp.name}</td><td class="px-3 py-2 text-slate-500">${emp.dept}</td><td class="px-3 py-2 text-blue-600">${emp.email}</td></tr>`;
        });
    }
    function filterEmailTable() {
        const q = document.getElementById('emailSearchInput').value.toLowerCase();
        renderEmailTable(employeeData.filter(e => e.name.toLowerCase().includes(q) || e.dept.toLowerCase().includes(q)));
    }
    function toggleSelect(cb) { if(cb.checked) selectedEmails.add(cb.dataset.email); else selectedEmails.delete(cb.dataset.email); document.getElementById('selectedCount').innerText = selectedEmails.size; document.getElementById('selectedCount').classList.toggle('hidden', selectedEmails.size === 0); }
    function toggleSelectAll(mainCb) { document.querySelectorAll('#emailTableBody input').forEach(cb => { cb.checked = mainCb.checked; toggleSelect(cb); }); }
    function copySelectedEmails() { navigator.clipboard.writeText(Array.from(selectedEmails).join(', ')).then(() => alert("Đã copy!")); }
    
    // Lọc & Điểm danh logic (giữ nguyên gốc)
    function processModuleEmails() { /* logic lọc */ }
    function scanAttendance() { /* logic điểm danh */ }

    setTimeout(() => renderEmailTable(employeeData), 100);
</script>
