<div class="h-full flex flex-col max-w-6xl mx-auto">
    <!-- TABS NAVBAR -->
    <div class="bg-slate-100 p-1 rounded-xl flex gap-1 mb-6 border border-slate-200 shrink-0">
        <button onclick="openToolTab('email-search')" id="tab-email-search" class="tool-tab active flex-1 py-2.5 text-sm font-bold rounded-lg text-slate-700 bg-white shadow-sm transition"><i class="fas fa-users mr-2"></i> Tra Cứu Email Admin</button>
        <button onclick="openToolTab('email-filter')" id="tab-email-filter" class="tool-tab flex-1 py-2.5 text-sm font-bold rounded-lg text-slate-500 hover:text-slate-700 transition"><i class="fas fa-filter mr-2"></i> Lọc Email Chat</button>
        <button onclick="openToolTab('attendance')" id="tab-attendance" class="tool-tab flex-1 py-2.5 text-sm font-bold rounded-lg text-slate-500 hover:text-slate-700 transition"><i class="fas fa-check-double mr-2"></i> Điểm Danh AI</button>
    </div>

    <!-- NỘI DUNG CHÍNH -->
    <div class="bg-white border border-slate-200 rounded-[32px] p-6 flex-grow overflow-hidden flex flex-col relative shadow-sm">
        
        <!-- TAB 1: TRA CỨU EMAIL (DỮ LIỆU ĐẦY ĐỦ 100%) -->
        <div id="email-search" class="tool-content h-full flex flex-col">
            <div class="flex flex-col md:flex-row justify-between items-center mb-6 gap-4 shrink-0 border-b border-slate-100 pb-4">
                <div class="relative w-full md:w-1/2">
                    <i class="fas fa-search absolute left-4 top-3.5 text-slate-400"></i>
                    <input type="text" id="toolSearchInput" oninput="filterEmailTable()" placeholder="Nhập tên hoặc mã phòng ban (VD: DSCTO, HN, BOD...)" class="w-full bg-slate-50 border border-slate-200 rounded-2xl pl-11 pr-4 py-3 text-sm outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-50 transition font-medium">
                </div>
                <button id="btnCopySelected" onclick="copySelectedEmails()" class="w-full md:w-auto px-8 py-3 bg-slate-900 hover:bg-blue-600 text-white rounded-2xl font-bold text-sm transition shadow-lg flex items-center justify-center gap-2">
                    <i class="far fa-copy"></i> Sao chép <span id="countSelected" class="bg-blue-500 text-white text-[10px] px-2 py-0.5 rounded-full hidden">0</span>
                </button>
            </div>

            <div class="border border-slate-200 rounded-2xl overflow-hidden flex-grow flex flex-col">
                <div class="overflow-y-auto custom-scrollbar flex-grow">
                    <table class="min-w-full text-left text-[12px] font-medium border-collapse">
                        <thead class="bg-slate-50 sticky top-0 z-10 border-b">
                            <tr>
                                <th class="px-4 py-3 text-center w-12"><input type="checkbox" id="selectAllCheckbox" onchange="toggleSelectAll(this)" class="w-4 h-4 accent-blue-600 cursor-pointer"></th>
                                <th class="px-4 py-3 text-slate-500 uppercase tracking-wider">Họ Tên</th>
                                <th class="px-4 py-3 text-slate-500 uppercase tracking-wider">Phòng Ban</th>
                                <th class="px-4 py-3 text-blue-600 uppercase tracking-wider">Email</th>
                            </tr>
                        </thead>
                        <tbody id="emailTableBody" class="divide-y divide-slate-100 text-slate-700">
                            <!-- JS RENDER DATA Ở ĐÂY -->
                        </tbody>
                    </table>
                </div>
            </div>
            <textarea id="copy-helper-tools" class="hidden"></textarea>
        </div>

        <!-- TAB 2: LỌC EMAIL CHAT -->
        <div id="email-filter" class="tool-content hidden h-full flex flex-col">
             <h3 class="text-lg font-black text-slate-800 mb-2">Tự động hóa Lọc Email Chat</h3>
             <div class="grid grid-cols-2 gap-6 flex-grow min-h-0">
                <textarea id="mod-input" class="h-full bg-slate-50 border border-slate-200 rounded-2xl p-5 text-sm outline-none focus:border-blue-400 resize-none" placeholder="Dán danh sách email thô từ Excel hoặc Google Sheet..."></textarea>
                <div class="flex flex-col h-full">
                    <textarea id="mod-output" readonly class="flex-grow bg-blue-50/30 border border-blue-100 rounded-2xl p-5 text-sm font-bold text-blue-700 outline-none resize-none mb-4" placeholder="Kết quả chuẩn có dấu phẩy..."></textarea>
                    <button onclick="processModuleEmails()" class="w-full py-4 bg-blue-600 text-white rounded-2xl font-black text-sm hover:bg-blue-700 shadow-xl transition">QUÉT & LÀM SẠCH DỮ LIỆU</button>
                </div>
             </div>
        </div>

        <!-- TAB 3: ĐIỂM DANH AI -->
        <div id="attendance" class="tool-content hidden h-full flex flex-col">
            <h3 class="text-lg font-black text-slate-800 mb-4">Điểm danh AI</h3>
            <div class="grid grid-cols-2 gap-6 h-full">
                <div class="flex flex-col">
                    <label class="text-xs font-black text-slate-400 uppercase mb-2">1. Dán Danh sách gốc</label>
                    <textarea id="input-roster" oninput="loadRoster()" class="flex-grow bg-slate-50 border rounded-2xl p-5 text-sm outline-none focus:border-blue-400 resize-none" placeholder="Copy cột Họ & Tên dán vào đây..."></textarea>
                </div>
                <div class="flex flex-col">
                    <label class="text-xs font-black text-slate-400 uppercase mb-2">2. Dán Danh sách Meet/Zoom</label>
                    <textarea id="input-meet" class="h-1/2 bg-slate-50 border rounded-2xl p-5 text-sm outline-none focus:border-emerald-400 resize-none mb-4" placeholder="Dán nội dung người tham gia..."></textarea>
                    <button onclick="scanAttendance()" class="w-full py-4 bg-emerald-500 text-white rounded-2xl font-black text-sm shadow-lg hover:bg-emerald-600 transition">KIỂM TRA ĐIỂM DANH</button>
                    <div id="att-result-list" class="mt-4 hidden p-4 bg-slate-50 rounded-2xl border border-slate-200 overflow-y-auto max-h-40 text-xs"></div>
                </div>
            </div>
        </div>

    </div>
</div>

    let selectedSet = new Set();

    // 2. PHẦN HÀM XỬ LÝ (SPA STYLE)
    function openToolTab(id) {
        document.querySelectorAll('.tool-content').forEach(c => c.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
        document.querySelectorAll('.tool-tab').forEach(t => t.className = "tool-tab flex-1 py-2.5 text-sm font-bold rounded-lg text-slate-500 hover:text-slate-700 transition");
        document.getElementById('tab-'+id).className = "tool-tab active flex-1 py-2.5 text-sm font-bold rounded-lg text-slate-700 bg-white shadow-sm transition";
    }

    function renderEmailTable(data) {
        const tbody = document.getElementById('emailTableBody');
        tbody.innerHTML = data.map(e => `
            <tr class="hover:bg-blue-50/40 transition cursor-pointer" onclick="toggleRow('${e.email}')">
                <td class="px-4 py-3 text-center"><input type="checkbox" id="check-${e.email}" class="w-4 h-4 accent-blue-600" ${selectedSet.has(e.email)?'checked':''} onclick="event.stopPropagation(); toggleRow('${e.email}')"></td>
                <td class="px-4 py-3 font-bold text-slate-800">${e.name}</td>
                <td class="px-4 py-3 text-slate-500 text-[11px]">${e.position}</td>
                <td class="px-4 py-3 text-slate-500 text-[11px]">${e.dept}</td>
                <td class="px-4 py-3 text-blue-600 font-bold">${e.email}</td>
            </tr>
        `).join('');
    }

    function filterEmailTable() {
        const q = document.getElementById('toolSearchInput').value.toLowerCase();
        const filtered = employeeData.filter(e => 
            e.name.toLowerCase().includes(q) || 
            e.dept.toLowerCase().includes(q) || 
            e.email.toLowerCase().includes(q)
        );
        renderEmailTable(filtered);
    }

    function toggleRow(email) {
        const cb = document.getElementById(`check-${email}`);
        if(selectedSet.has(email)) { selectedSet.delete(email); cb.checked = false; }
        else { selectedSet.add(email); cb.checked = true; }
        updateUI();
    }

    function toggleAll(master) {
        document.querySelectorAll('#emailTableBody input').forEach(cb => {
            const email = cb.id.split('check-')[1];
            cb.checked = master.checked;
            if(master.checked) selectedSet.add(email); else selectedSet.delete(email);
        });
        updateUI();
    }

    function updateUI() {
        const count = document.getElementById('countSelected');
        count.innerText = selectedSet.size;
        count.classList.toggle('hidden', selectedSet.size === 0);
    }

    function copySelectedEmails() {
        if(selectedSet.size === 0) return alert("Vui lòng chọn ít nhất 1 email!");
        const text = Array.from(selectedSet).join(', ');
        navigator.clipboard.writeText(text).then(() => {
            const toast = document.getElementById('toolToast');
            toast.classList.remove('translate-y-20', 'opacity-0');
            setTimeout(() => toast.classList.add('translate-y-20', 'opacity-0'), 2500);
        });
    }

    // --- LOGIC LỌC EMAIL GOOGLE CHAT ---
    function processModuleEmails() {
        const input = document.getElementById('mod-input').value;
        const matches = input.match(/[a-zA-Z0-9._%+-]+@kiotviet\.com/g);
        if(matches) {
            const unique = [...new Set(matches.map(e => e.toLowerCase()))];
            document.getElementById('mod-output').value = unique.join(', ');
        } else {
            alert("Không tìm thấy email @kiotviet.com nào!");
        }
    }

    // --- LOGIC ĐIỂM DANH ---
    let rosterNames = [];
    function loadRoster() {
        const raw = document.getElementById('input-roster').value.trim();
        rosterNames = raw.split('\n').filter(n => n.trim() !== '');
    }

    function scanAttendance() {
        const meetText = document.getElementById('input-meet').value.toLowerCase();
        const resBox = document.getElementById('att-result-list');
        if(rosterNames.length === 0) return alert("Hãy dán danh sách gốc trước!");
        
        resBox.classList.remove('hidden');
        resBox.innerHTML = rosterNames.map(name => {
            const found = meetText.includes(name.toLowerCase().trim());
            return `<div class="flex justify-between p-1 border-b ${found?'text-emerald-600 font-bold':'text-rose-500'}"><span>${name}</span><span>${found?'CÓ MẶT':'VẮNG'}</span></div>`;
        }).join('');
    }

    // Khởi tạo bảng
    renderEmailTable(employeeData);
</script>
