<div>
    <div class="mb-6">
        <h1 class="text-2xl font-black text-slate-800 tracking-tight">Danh Sách Khóa Học</h1>
        <p class="text-xs font-medium text-slate-500 mt-1">Truy cập kịch bản và quản lý công việc của từng khóa</p>
    </div>
    
    <div class="relative max-w-sm mb-6">
        <i class="fas fa-search absolute left-4 top-3 text-slate-400"></i>
        <input type="text" oninput="debounce(filterCourses(this.value), 300)" placeholder="Tìm kiếm khóa học..." class="w-full pl-10 pr-4 py-2.5 bg-white border border-slate-200 rounded-xl text-sm outline-none focus:border-blue-400 focus:ring-2 focus:ring-blue-100 transition shadow-sm">
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 pb-10" id="course-grid"></div>
</div>

<script>
    function renderCourseGrid(courses) {
        const grid = document.getElementById('course-grid'); grid.innerHTML = '';
        courses.forEach(c => {
            let statusColor = "bg-amber-50 text-amber-600 border-amber-100";
            if(c.status === 'Đang diễn ra') statusColor = "bg-emerald-50 text-emerald-600 border-emerald-100";
            if(c.status === 'Đã hoàn thành') statusColor = "bg-blue-50 text-blue-600 border-blue-100";
            const isClickable = ['SPCB', 'KV1', 'TAX'].includes(c.id);
            grid.innerHTML += `
                <div class="bg-white border-t-4 border-${c.color}-500 border border-slate-200 rounded-[24px] p-6 flex flex-col h-full hover-5d group shadow-sm">
                    <span class="text-[9px] font-black text-${c.color}-600 bg-${c.color}-50 px-2.5 py-1 rounded-md uppercase tracking-widest w-fit mb-4 border border-${c.color}-100">${c.label}</span>
                    <h3 class="text-lg font-black text-slate-800 mb-1">${c.title}</h3>
                    <p class="text-xs text-slate-400 font-bold mb-4 font-mono">Mã: ${c.prefix}XX</p>
                    <p class="text-[13px] text-slate-500 font-medium mb-8 flex-grow">${c.desc}</p>
                    <div class="flex justify-between items-center mb-5 pb-5 border-b border-slate-100">
                        <span class="text-sm font-bold text-slate-700"><i class="fas fa-layer-group text-slate-300 mr-2"></i>${c.sessions} buổi</span>
                        <span class="text-[10px] font-bold px-2.5 py-1 rounded-md border ${statusColor}">${c.status}</span>
                    </div>
                    <div class="grid grid-cols-2 gap-3 mt-auto">
                        ${isClickable 
                            ? `<a href="#course-${c.id.toLowerCase()}" class="text-center py-2.5 bg-blue-600 text-white rounded-xl text-sm font-bold hover:bg-blue-700 transition shadow-sm">Vào Giảng Dạy</a>
                               <a href="#tasks-${c.id.toLowerCase()}" class="text-center py-2.5 bg-white border border-slate-200 text-slate-600 rounded-xl text-sm font-bold hover:bg-slate-50 transition">Công Việc</a>`
                            : `<button disabled class="col-span-2 text-center py-2.5 bg-slate-100 text-slate-400 rounded-xl text-sm font-bold cursor-not-allowed">Đang cập nhật</button>`
                        }
                    </div>
                </div>`;
        });
    }
    function filterCourses(q) {
        const filtered = window.courseConfig.filter(c => c.title.toLowerCase().includes(q.toLowerCase()) || c.id.toLowerCase().includes(q.toLowerCase()));
        renderCourseGrid(filtered);
    }
    renderCourseGrid(window.courseConfig);
</script>
