<div class="animate-in fade-in duration-500">
    <div class="mb-8">
        <h1 class="text-3xl font-black text-slate-800 tracking-tight">Khóa Học Đào Tạo</h1>
        <p class="text-sm font-medium text-slate-500 mt-1 text-blue-500/80">Quản lý kịch bản và tiến trình admin từng khóa</p>
    </div>
    
    <div class="relative max-w-sm mb-10">
        <i class="fas fa-search absolute left-4 top-3 text-slate-400"></i>
        <input type="text" oninput="filterCourses(this.value)" placeholder="Tìm kiếm khóa học..." class="w-full pl-11 pr-4 py-3 bg-white border border-slate-200 rounded-2xl text-sm outline-none focus:border-blue-400 focus:ring-4 focus:ring-blue-50 transition shadow-sm font-medium">
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 pb-12" id="course-grid">
        <!-- Render tự động bởi JS bên dưới -->
    </div>
</div>

<script>
    function renderCourseGrid(courses) {
        const grid = document.getElementById('course-grid');
        grid.innerHTML = '';
        courses.forEach(c => {
            const isAvailable = ['SPCB', 'KV1', 'TAX'].includes(c.id);
            const statusColor = c.status === 'Đang diễn ra' ? 'bg-emerald-50 text-emerald-600 border-emerald-100' : 'bg-amber-50 text-amber-600 border-amber-100';

            grid.innerHTML += `
                <div class="bg-white border-t-4 border-${c.color}-500 border border-slate-200 rounded-[32px] p-7 flex flex-col h-full hover-5d group shadow-sm">
                    <span class="text-[10px] font-black text-${c.color}-600 bg-${c.color}-50 px-3 py-1 rounded-full uppercase tracking-widest w-fit mb-5 border border-${c.color}-100">${c.label}</span>
                    <h3 class="text-xl font-black text-slate-800 mb-2 tracking-tight group-hover:text-blue-600 transition-colors">${c.title}</h3>
                    <p class="text-xs text-slate-400 font-bold mb-5 font-mono">Mã Prefix: ${c.prefix}-XX</p>
                    <p class="text-[13px] text-slate-500 font-medium mb-10 flex-grow leading-relaxed">${c.desc}</p>
                    
                    <div class="flex justify-between items-center mb-6 pt-5 border-t border-slate-50">
                        <span class="text-sm font-bold text-slate-700"><i class="fas fa-layer-group text-slate-300 mr-2"></i>${c.sessions} buổi</span>
                        <span class="text-[10px] font-bold px-3 py-1 rounded-lg border ${statusColor}">${c.status}</span>
                    </div>

                    <div class="grid grid-cols-2 gap-3 mt-auto">
                        ${isAvailable 
                            ? `<a href="#course-${c.id.toLowerCase()}" class="text-center py-3 bg-blue-600 text-white rounded-2xl text-xs font-black hover:bg-blue-700 transition shadow-lg shadow-blue-100">GIẢNG DẠY</a>
                               <a href="#tasks-${c.id.toLowerCase()}" class="text-center py-3 bg-white border border-slate-200 text-slate-600 rounded-2xl text-xs font-black hover:bg-slate-50 transition">CÔNG VIỆC</a>`
                            : `<button disabled class="col-span-2 text-center py-3 bg-slate-50 text-slate-300 rounded-2xl text-xs font-black cursor-not-allowed uppercase">Chờ cập nhật kịch bản</button>`
                        }
                    </div>
                </div>
            `;
        });
    }

    function filterCourses(q) {
        const filtered = window.courseConfig.filter(c => c.title.toLowerCase().includes(q.toLowerCase()) || c.id.toLowerCase().includes(q.toLowerCase()));
        renderCourseGrid(filtered);
    }
    
    // Khởi chạy ngay khi load
    renderCourseGrid(window.courseConfig);
</script>
