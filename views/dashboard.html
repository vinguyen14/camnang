<div class="max-w-6xl mx-auto">
    <!-- TIÊU ĐỀ ĐÃ TỐI ƯU LẠI -->
    <div class="mb-8">
        <h1 class="text-3xl font-black text-slate-800 tracking-tight">Dashboard</h1>
        <p class="text-sm font-medium text-slate-500 mt-1">Hệ thống tổng hợp dữ liệu hiệu suất theo thời gian thực</p>
    </div>

    <!-- 4 THẺ CHỈ SỐ -->
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
        <div class="border border-slate-200 rounded-2xl p-6 bg-white shadow-sm h-32 hover-5d">
            <div class="flex justify-between items-center"><span class="text-xs font-bold text-slate-500 uppercase">Khóa Học</span><div class="w-8 h-8 rounded-full bg-slate-100 flex items-center justify-center text-slate-400"><i class="fas fa-book"></i></div></div>
            <div class="mt-4 text-4xl font-black text-slate-800" id="dash-total-course">0</div>
        </div>
        <div class="border border-slate-200 rounded-2xl p-6 bg-white shadow-sm h-32 hover-5d">
            <div class="flex justify-between items-center"><span class="text-xs font-bold text-slate-500 uppercase">Học Viên</span><div class="w-8 h-8 rounded-full bg-indigo-50 flex items-center justify-center text-indigo-400"><i class="fas fa-users"></i></div></div>
            <div class="mt-4 text-4xl font-black text-slate-800" id="dash-total-trainee">0</div>
        </div>
        <div class="border border-slate-200 rounded-2xl p-6 bg-white shadow-sm h-32 hover-5d">
            <div class="flex justify-between items-center"><span class="text-xs font-bold text-emerald-600 uppercase">HV Đạt</span><div class="w-8 h-8 rounded-full bg-emerald-50 flex items-center justify-center text-emerald-500"><i class="fas fa-check-circle"></i></div></div>
            <div class="mt-4 text-4xl font-black text-emerald-500" id="dash-total-pass">0</div>
        </div>
        <div class="border border-slate-200 rounded-2xl p-6 bg-white shadow-sm h-32 hover-5d">
            <div class="flex justify-between items-center"><span class="text-xs font-bold text-blue-600 uppercase">Tỷ Lệ</span><div class="w-8 h-8 rounded-full bg-blue-50 flex items-center justify-center text-blue-500"><i class="fas fa-arrow-trend-up"></i></div></div>
            <div class="mt-4 text-4xl font-black text-blue-600" id="dash-rate">0%</div>
        </div>
    </div>

    <!-- THÔNG BÁO & TIN TỨC -->
    <div class="bg-gradient-to-r from-blue-600 to-indigo-600 p-8 rounded-3xl text-white relative overflow-hidden mb-8 shadow-2xl shadow-blue-200">
        <div class="absolute -right-10 -bottom-10 w-40 h-40 bg-white/10 rounded-full"></div>
        <h2 class="text-2xl font-black mb-2">Chào mừng trở lại, Ve!</h2>
        <p class="max-w-lg opacity-80">Đây là trung tâm điều khiển của bạn. Mọi dữ liệu về hiệu suất và kịch bản giảng dạy đều được cập nhật tại đây.</p>
    </div>
</div>

<script>
    function renderDashboardData() {
        const db = window.loadMasterDB();
        let sumTrainee = 0, sumPass = 0;
        db.forEach(item => {
            sumTrainee += parseInt(item.totalTrainees) || 0;
            sumPass += parseInt(item.passedTrainees) || 0;
        });
        const rate = sumTrainee > 0 ? Math.round((sumPass/sumTrainee)*100) : 0;
        
        document.getElementById('dash-total-course').innerText = db.length;
        document.getElementById('dash-total-trainee').innerText = sumTrainee;
        document.getElementById('dash-total-pass').innerText = sumPass;
        document.getElementById('dash-rate').innerText = rate + '%';
    }
    renderDashboardData();
</script>
