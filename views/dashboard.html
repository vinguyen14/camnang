<div class="max-w-5xl mx-auto">
    <!-- HEADER TRANG CON CHUẨN SAAS -->
    <div class="mb-8">
        <h1 class="text-3xl font-black text-slate-800 tracking-tight">Tổng Quan Hệ Thống</h1>
        <p class="text-sm font-medium text-slate-500 mt-1">Điều khiển trung tâm và kịch bản khóa học</p>
    </div>

    <!-- 4 THẺ CHỈ SỐ -->
    <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-10">
        <div class="border border-slate-200 rounded-2xl p-5 bg-white shadow-[0_4px_20px_-4px_rgba(0,0,0,0.05)] flex flex-col justify-between h-28 hover-5d">
            <div class="flex justify-between items-center"><span class="text-xs font-bold text-slate-500 uppercase tracking-widest">Khóa Học</span><div class="w-8 h-8 rounded-full bg-slate-50 flex items-center justify-center text-slate-400"><i class="fas fa-book"></i></div></div>
            <div class="text-3xl font-black text-slate-800" id="dash-total-course">0</div>
        </div>
        <div class="border border-slate-200 rounded-2xl p-5 bg-white shadow-[0_4px_20px_-4px_rgba(0,0,0,0.05)] flex flex-col justify-between h-28 hover-5d">
            <div class="flex justify-between items-center"><span class="text-xs font-bold text-slate-500 uppercase tracking-widest">Học Viên</span><div class="w-8 h-8 rounded-full bg-indigo-50 flex items-center justify-center text-indigo-400"><i class="fas fa-users"></i></div></div>
            <div class="text-3xl font-black text-slate-800" id="dash-total-trainee">0</div>
        </div>
        <div class="border border-slate-200 rounded-2xl p-5 bg-white shadow-[0_4px_20px_-4px_rgba(0,0,0,0.05)] flex flex-col justify-between h-28 hover-5d">
            <div class="flex justify-between items-center"><span class="text-xs font-bold text-emerald-600 uppercase tracking-widest">HV Đạt</span><div class="w-8 h-8 rounded-full bg-emerald-50 flex items-center justify-center text-emerald-500"><i class="fas fa-check-circle"></i></div></div>
            <div class="text-3xl font-black text-emerald-500" id="dash-total-pass">0</div>
        </div>
        <div class="border border-slate-200 rounded-2xl p-5 bg-white shadow-[0_4px_20px_-4px_rgba(0,0,0,0.05)] flex flex-col justify-between h-28 hover-5d">
            <div class="flex justify-between items-center"><span class="text-xs font-bold text-blue-600 uppercase tracking-widest">Tỷ Lệ</span><div class="w-8 h-8 rounded-full bg-blue-50 flex items-center justify-center text-blue-500"><i class="fas fa-arrow-trend-up"></i></div></div>
            <div class="text-3xl font-black text-blue-600" id="dash-rate">0%</div>
        </div>
    </div>

    <!-- TÌM KIẾM -->
    <div class="flex justify-between items-center mb-6 gap-4">
        <div class="relative flex-1 max-w-sm">
            <i class="fas fa-search absolute left-4 top-3 text-slate-400"></i>
            <input type="text" id="course-search" oninput="filterDashboardCourses()" placeholder="Tìm kiếm khóa học..." class="w-full pl-10 pr-4 py-2.5 bg-white border border-slate-200 rounded-xl text-sm outline-none focus:border-blue-400 focus:ring-4 focus:ring-blue-50 transition shadow-sm font-medium text-slate-700">
        </div>
    </div>

    <!-- LƯỚI KHÓA HỌC -->
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 pb-10" id="dashboard-course-grid">
        <!-- Render bằng JS -->
    </div>
</div>

<script>
    function renderDashboardData() {
        const db = window.loadMasterDB();
        let sumTrainee = 0, sumPass = 0;
        db.forEach(item => { sumTrainee += parseInt(item.totalTrainees) || 0; sumPass += parseInt(item.passedTrainees) || 0; });
        const rate = sumTrainee > 0 ? Math.round((sumPass/sumTrainee)*100) : 0;
        
        document.getElementById('dash-total-course').innerText = window.courseConfig.length;
        document.getElementById('dash-total-trainee').innerText = sumTrainee;
        document.getElementById('dash-total-pass').innerText = sumPass;
        document.getElementById('dash-rate').innerText = rate + '%';
        
        renderCourseGrid(window.courseConfig);
    }

    function filterDashboardCourses() {
        const q = document.getElementById('course-search').value.toLowerCase();
        const filtered = window.courseConfig.filter(c => c.title.toLowerCase().includes(q) || c.id.toLowerCase().includes(q));
        renderCourseGrid(filtered);
    }

    function renderCourseGrid(courses) {
        const grid = document.getElementById('dashboard-course-grid');
        grid.innerHTML = '';
        courses.forEach(c => {
            // Logic màu status
            let statusColor = "bg-amber-50 text-amber-600 border-amber-100";
            if(c.status === 'Đang diễn ra') statusColor = "bg-emerald-50 text-emerald-600 border-emerald-100";
            if(c.status === 'Đã hoàn thành') statusColor = "bg-blue-50 text-blue-600 border-blue-100";

            // Có hỗ trợ link hay ko? (Tránh FNB, Salon chưa có kịch bản chi tiết)
            const isClickable = c.id === 'SPCB' || c.id === 'KV1' || c.id === 'TAX';

            grid.innerHTML += `
                <div class="bg-white border-t-4 border-${c.color}-500 border border-slate-200 rounded-[24px] p-6 flex flex-col h-full hover-5d group shadow-sm">
                    <span class="text-[9px] font-black text-${c.color}-600 bg-${c.color}-50 px-2.5 py-1 rounded-md uppercase tracking-widest w-fit mb-4 border border-${c.color}-100">${c.label}</span>
                    <h3 class="text-xl font-black text-slate-800 mb-1 tracking-tight">${c.title}</h3>
                    <p class="text-xs text-slate-400 font-bold mb-4 font-mono bg-slate-50 w-fit px-2 py-0.5 rounded border border-slate-100">Mã: ${c.id}-2026-XX</p>
                    <p class="text-[13px] text-slate-500 font-medium mb-8 flex-grow leading-relaxed">${c.desc}</p>
                    
                    <div class="flex justify-between items-center mb-5 pb-5 border-b border-slate-100">
                        <span class="text-sm font-bold text-slate-700 flex items-center"><i class="fas fa-layer-group text-slate-300 mr-2"></i>${c.sessions > 0 ? c.sessions + ' buổi' : '-- buổi'}</span>
                        <span class="text-[10px] font-bold px-2.5 py-1 rounded-md border ${statusColor}">${c.status}</span>
                    </div>

                    <div class="grid grid-cols-2 gap-3 mt-auto">
                        ${isClickable 
                            ? `<a href="#course-${c.id.toLowerCase()}" class="text-center py-2.5 bg-blue-600 text-white rounded-xl text-sm font-bold hover:bg-blue-700 transition shadow-[0_5px_15px_-5px_rgba(37,99,235,0.4)]">Vào Giảng Dạy</a>
                               <a href="#tasks-${c.id.toLowerCase()}" class="text-center py-2.5 bg-white border border-slate-200 text-slate-600 rounded-xl text-sm font-bold hover:bg-slate-50 hover:text-slate-800 transition shadow-sm">Công Việc</a>`
                            : `<button disabled class="col-span-2 text-center py-2.5 bg-slate-100 text-slate-400 rounded-xl text-sm font-bold cursor-not-allowed">Hệ thống đang cập nhật</button>`
                        }
                    </div>
                </div>
            `;
        });
    }

    renderDashboardData();
</script>
