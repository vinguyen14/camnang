<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>THE CHOSEN ONE V7.5 - PROBLEM SOLVING</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Inter:wght@300;400;600;800;italic&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --primary: #00d2ff; --secondary: #3a7bd5; --accent: #00ff88;
            --bg: #0b0e14; --panel: rgba(23, 28, 40, 0.95); --border: rgba(0, 210, 255, 0.2);
            --danger: #ff4757; --glass: rgba(255, 255, 255, 0.05);
            --warning: #fbc531;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif; background: var(--bg); color: #fff;
            height: 100vh; display: flex; flex-direction: column; overflow: hidden;
            background-image: radial-gradient(circle at 50% 50%, #1a202c 0%, #0b0e14 100%);
        }
        header { padding: 15px 40px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: rgba(11, 14, 20, 0.98); }
        .logo { font-family: 'Orbitron', sans-serif; font-size: 22px; font-weight: 900; color: var(--primary); }
        .session-tabs { display: flex; background: var(--glass); padding: 5px; border-radius: 12px; border: 1px solid var(--border); }
        .tab { padding: 10px 25px; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 800; color: #64748b; border: none; background: none; transition: 0.3s; }
        .tab.active { background: var(--primary); color: #000; box-shadow: 0 0 15px var(--primary); }
        .main-grid { display: grid; grid-template-columns: 320px 1fr 450px; gap: 20px; padding: 20px; flex: 1; overflow: hidden; }
        .panel { background: var(--panel); border: 1px solid var(--border); border-radius: 20px; padding: 25px; display: flex; flex-direction: column; overflow: hidden; }
        textarea { flex: 1; background: rgba(0,0,0,0.3); border: 1px solid var(--border); border-radius: 12px; color: var(--accent); padding: 15px; font-size: 14px; outline: none; margin-bottom: 15px; }
        .winner-display { font-family: 'Orbitron', sans-serif; font-size: 40px; font-weight: 900; text-align: center; margin-bottom: 20px; min-height: 60px; color: #fff; text-shadow: 0 0 20px var(--primary); }
        .spin-btn { width: 150px; height: 150px; border-radius: 50%; border: 8px solid var(--glass); background: linear-gradient(135deg, var(--secondary), var(--primary)); color: white; font-family: 'Orbitron'; font-size: 16px; font-weight: 900; cursor: pointer; align-self: center; transition: 0.3s; box-shadow: 0 0 20px rgba(0, 210, 255, 0.3); }
        .spin-btn:hover { transform: scale(1.05); box-shadow: 0 0 40px rgba(0, 210, 255, 0.6); }
        .spin-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: scale(1); box-shadow: none; }
        #actionArea { margin-top: 15px; display: none; }
        .comment-box { width: 100%; height: 80px; background: rgba(255,255,255,0.08); border: 1px solid var(--primary); border-radius: 12px; color: #fff; padding: 15px; font-size: 14px; margin-bottom: 10px; outline: none; resize: none; }
        .sc-card { background: rgba(255,255,255,0.02); border-radius: 16px; padding: 20px; flex: 1; overflow-y: auto; border: 1px solid rgba(255,255,255,0.05); }
        .sc-tag { display: inline-block; background: var(--primary); color: #000; padding: 2px 8px; border-radius: 4px; font-weight: 900; font-size: 12px; margin-right: 8px; vertical-align: middle; }
        .sc-biz { font-size: 19px; font-weight: 800; color: #fff; margin-bottom: 5px; }
        .sc-goal { font-size: 12px; color: var(--accent); font-weight: 600; margin-bottom: 15px; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
        
        /* Styles for Problem Solving Approach */
        .sc-customer-voice { background: rgba(255, 255, 255, 0.05); border-left: 4px solid var(--primary); padding: 15px; font-size: 14px; color: #e2e8f0; margin-bottom: 15px; line-height: 1.6; font-style: italic; border-radius: 0 8px 8px 0; }
        .sc-customer-voice b { color: var(--primary); font-style: normal; display: block; margin-bottom: 5px; font-size: 12px; text-transform: uppercase;}
        
        .trainer-toggle { background: rgba(251, 197, 49, 0.1); border: 1px dashed var(--warning); color: var(--warning); padding: 8px 12px; border-radius: 6px; font-size: 11px; font-weight: bold; cursor: pointer; width: 100%; text-align: left; margin-top: 10px; transition: 0.3s; display: flex; justify-content: space-between; align-items: center; }
        .trainer-toggle:hover { background: rgba(251, 197, 49, 0.2); }
        .trainer-notes { display: none; background: rgba(0,0,0,0.5); border: 1px solid var(--warning); padding: 15px; border-radius: 8px; margin-top: 10px; font-size: 13px; line-height: 1.5; color: #dcdde1; }
        .trainer-notes b { color: var(--warning); }
        .trainer-notes ul { margin-left: 20px; margin-top: 5px; margin-bottom: 10px; }
        .trainer-notes li { margin-bottom: 5px; }

        .sc-step { font-size: 13px; margin-bottom: 8px; color: #cbd5e1; display: flex; gap: 10px; line-height: 1.5; }
        .sc-step b { color: var(--primary); min-width: 15px; }
        .report-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 15px; }
        .report-item { background: rgba(0, 210, 255, 0.1); border: 1px solid var(--primary); padding: 8px; border-radius: 8px; font-size: 11px; text-align: center; color: var(--primary); font-weight: 700; }
        .history-item { padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.05); cursor: pointer; border-radius: 8px; margin-bottom: 5px; }
        .history-item:hover { background: rgba(0,210,255,0.1); }
        
        /* Modals Standard */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; z-index: 9999; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .modal-content { background: #171c28; width: 550px; max-height: 85vh; border-radius: 24px; border: 1px solid var(--primary); padding: 30px; position: relative; overflow-y: auto; }
        
        /* Bổ sung: GAME LẬT THẺ BÀI (CARD FLIP) */
        #gameModal { flex-direction: column; z-index: 10000; perspective: 1000px; }
        .card-scene { width: 400px; height: 550px; perspective: 1000px; margin-top: 20px; }
        .game-card { width: 100%; height: 100%; position: relative; transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275); transform-style: preserve-3d; cursor: pointer; }
        .game-card.is-flipped { transform: rotateY(180deg); }
        .game-card-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 20px; display: flex; flex-direction: column; overflow-y: auto; border: 2px solid var(--primary); box-shadow: 0 10px 40px rgba(0,210,255,0.3); }
        
        .game-card-front { background: linear-gradient(145deg, #171c28 0%, #0b0e14 100%); align-items: center; justify-content: center; text-align: center; }
        .game-card-front .card-icon { font-size: 90px; filter: drop-shadow(0 0 20px var(--primary)); margin-bottom: 20px; }
        .game-card-front h2 { font-family: 'Orbitron', sans-serif; font-size: 26px; color: var(--primary); text-shadow: 0 0 15px var(--primary); margin-bottom: 10px; }
        .game-card-front p { color: #64748b; font-size: 14px; font-weight: 600; text-transform: uppercase; letter-spacing: 2px; animation: pulse 1.5s infinite; }
        
        .game-card-back { background: var(--panel); transform: rotateY(180deg); padding: 25px; display: block; }
        .game-card-back::-webkit-scrollbar { width: 6px; }
        .game-card-back::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }
        
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }

        .btn-group { display: flex; gap: 10px; }
        .btn { padding: 10px 15px; border-radius: 10px; border: 1px solid var(--border); background: var(--glass); color: #fff; cursor: pointer; font-size: 11px; font-weight: 700; transition: 0.2s; }
        .btn-primary { background: var(--primary); color: #000; border: none; font-weight: 900; }
        .btn-primary:hover { box-shadow: 0 0 15px var(--primary); }
        .btn-accent { border-color: var(--accent); color: var(--accent); }
    </style>
</head>
<body>
    <header>
        <div class="logo">THE CHOSEN ONE V7.5</div>
        <div class="session-tabs">
            <button id="t1" class="tab active" onclick="setSess(1)">BUỔI 1: CƠ BẢN</button>
            <button id="t2" class="tab" onclick="setSess(2)">BUỔI 2: NÂNG CAO</button>
        </div>
        <div class="btn-group">
            <button class="btn" onclick="toggleEditModal()">⚙️ CẬP NHẬT KỊCH BẢN</button>
            <button class="btn" onclick="exportExcel()" style="color:var(--accent)">📥 EXCEL</button>
        </div>
    </header>

    <div class="main-grid">
        <div class="panel">
            <h3 style="color:var(--primary); font-size:11px; margin-bottom:10px">HỌC VIÊN (<span id="c">0</span>)</h3>
            <textarea id="names" placeholder="Dán danh sách học viên..."></textarea>
            <button class="btn btn-primary" onclick="save()">LƯU DANH SÁCH GỐC</button>
        </div>

        <div class="panel" style="justify-content:center">
            <div id="winner" class="winner-display">READY?</div>
            <div style="display:flex; flex-direction:column; gap:15px; align-items:center">
                <button id="spin" class="spin-btn" onclick="start('full')">TRIỆU HỒI</button>
                <div id="quickBtns" style="display:none; gap:10px">
                    <button class="btn btn-accent" onclick="start('script')">♻️ ĐỔI TÌNH HUỐNG</button>
                    <button class="btn btn-accent" onclick="start('user')">👥 GỌI NGƯỜI KHÁC</button>
                </div>
            </div>
            <div id="actionArea">
                <textarea id="cmt" class="comment-box" placeholder="Nhận xét cách học viên phân tích và xử lý luồng..."></textarea>
                <div class="btn-group">
                    <button class="btn" style="background:var(--danger); flex:1" onclick="done('Vắng')">VẮNG</button>
                    <button class="btn btn-primary" style="flex:2" onclick="done('Hoàn thành')">XÁC NHẬN</button>
                </div>
            </div>
        </div>

        <div class="panel">
            <h3 style="color:var(--accent); font-size:11px; margin-bottom:10px">ĐỀ BÀI</h3>
            <div id="scBox" class="sc-card"><div style="text-align:center; color:#64748b; margin-top:50px">Sẵn sàng...</div></div>
            <h3 style="color:var(--primary); font-size:11px; margin-top:15px; margin-bottom:5px">LỊCH SỬ</h3>
            <div id="histList" style="flex:0.8; overflow-y:auto; border-top:1px solid #333; padding-top:10px"></div>
        </div>
    </div>

    <!-- MỚI: Modal Game Lật Thẻ Bài -->
    <div id="gameModal" class="modal">
        <h2 id="gameWinnerName" style="font-family:'Orbitron'; color:#fff; font-size:35px; text-shadow: 0 0 20px var(--primary); letter-spacing: 2px;">TÊN HỌC VIÊN</h2>
        <div class="card-scene">
            <div class="game-card" id="theGameCard" onclick="flipCard()">
                <div class="game-card-face game-card-front">
                    <div class="card-icon">🃏</div>
                    <h2>THẺ TÌNH HUỐNG</h2>
                    <p>Nhấn vào để lật thẻ</p>
                </div>
                <div class="game-card-face game-card-back" id="cardBackContent">
                    <!-- Nội dung kịch bản sẽ được đẩy vào đây -->
                </div>
            </div>
        </div>
        <button id="closeGameBtn" class="btn btn-primary" style="margin-top: 30px; padding: 15px 40px; font-size: 14px; opacity: 0; pointer-events: none; transition: 0.5s;" onclick="closeGameModal()">BẮT ĐẦU</button>
    </div>

    <!-- Modals Cũ (History & Cập nhật) -->
    <div id="historyModal" class="modal">
        <div class="modal-content">
            <span style="position:absolute; top:20px; right:20px; cursor:pointer; font-size:24px" onclick="closeModal()">×</span>
            <div id="modalBody"></div>
        </div>
    </div>

    <div id="editModal" class="modal">
        <div class="modal-content" style="width: 80%; max-width: 900px;">
            <h2 style="margin-bottom: 15px; color: var(--primary);">CẬP NHẬT DỮ LIỆU KỊCH BẢN (JSON)</h2>
            <textarea id="jsonEditor" style="height: 450px; font-family: monospace; color: #fff;"></textarea>
            <div class="btn-group" style="justify-content: flex-end; margin-top: 15px;">
                <button class="btn" onclick="toggleEditModal()">HỦY</button>
                <button class="btn btn-primary" onclick="updateScripts()">LƯU THAY ĐỔI</button>
            </div>
        </div>
    </div>

    <script>
        let scripts = {
            buoi1: [
                {
                    tag: "B1-S1", biz: "Thời trang Nem Luxury", goal: "Nhiệm vụ: Lắng nghe vấn đề và trình bày giải pháp vận hành 6 bước.", 
                    customerVoice: "Dạo gần đây cửa hàng tôi rất lộn xộn. Có một mẫu Váy lụa mới về, nhân viên báo trên phần mềm còn hàng nhưng vô kho tìm thì toàn sai kích cỡ hoặc màu khách cần. Chưa kể hôm qua có khách mua 2 cái váy, trả 1 ít tiền mặt, còn lại chuyển khoản, nay họ lại mang 1 cái ra đòi trả lại lấy tiền. Nhân viên tôi loạn xì ngầu lên không biết ghi chép sao cho dòng tiền với kho không bị lệch. Bạn tư vấn giúp tôi phần mềm xử lý chuyện này thế nào?", 
                    trainerNotes: { analysis: "Học viên cần nhận diện được 2 bài toán: Quản lý Thuộc tính (Size/Màu) và Quản lý thanh toán đa hình thức + Xử lý Trả hàng.", hints: ["Em sẽ thiết lập mặt hàng Váy lụa này như thế nào để kho không bị lẫn lộn giữa các màu/size?", "Khách thanh toán 2 hình thức (Tiền mặt + CK), ở màn hình bán hàng em xử lý sao?", "Khi làm thao tác Trả hàng, làm sao để hệ thống tự biết trừ tiền trong Két/Tài khoản và tự cộng lại tồn kho váy?"] }
                },
                {
                    tag: "B1-S2", biz: "Tạp hóa An Bình", goal: "Nhiệm vụ: Lắng nghe vấn đề và trình bày giải pháp vận hành 6 bước.", 
                    customerVoice: "Tôi mở tiệm tạp hóa, bia với nước ngọt tôi nhập từ đại lý toàn tính bằng Thùng, nhưng khách ở xóm thì hay mua lẻ vài Lon. Cứ bán 1 thời gian là kho lệch tè le. Đau đầu nhất là khách quen toàn mua chịu (ghi sổ), tôi thì cũng mua thiếu của đại lý. Cuốn sổ nợ của tôi giờ chằng chịt, cuối tháng đi đối soát thu tiền với trả tiền mệt mỏi vô cùng. Phần mềm có tự động tính toán được mấy cái này không?", 
                    trainerNotes: { analysis: "Học viên cần nhận diện bài toán: Đơn vị quy đổi và Quản lý công nợ hai chiều (Khách hàng & Nhà cung cấp).", hints: ["Làm sao để phần mềm hiểu 1 Thùng có bao nhiêu Lon để tự trừ kho dù anh Bình bán theo đơn vị nào?", "Khi nhập hàng mua chịu của đại lý, em sẽ thao tác thế nào ở Phiếu nhập kho?", "Khách mua chịu hôm nay, tuần sau ra trả tiền, luồng thao tác trên phần mềm sẽ đi như thế nào?"] }
                },
                {
                    tag: "B1-S3", biz: "Mỹ phẩm Guardian", goal: "Nhiệm vụ: Lắng nghe vấn đề và trình bày giải pháp vận hành 6 bước.", 
                    customerVoice: "Đặc thù ngành son phấn của tôi là khách hay đổi trả. Khách hàng mua cây son 3CE màu Cánh hồng phai về mở ra xem không ưng, xong đem ra tiệm bắt trả lại tiền. Cứ mỗi lần vậy, nhân viên của tôi rút tiền mặt trong két ra thối cho khách. Cuối ngày chốt ca, đếm tiền thật trong két lúc nào cũng hụt so với doanh thu trên phần mềm. Có cách nào giải quyết dứt điểm tình trạng nhân viên thối tiền trả hàng làm lệch két không bạn?", 
                    trainerNotes: { analysis: "Học viên cần nhận diện bài toán: Thao tác đúng nghiệp vụ Trả hàng để quản lý dòng tiền mặt (Sổ quỹ/Két tiền).", hints: ["Lý do đếm tiền thực tế bị hụt so với phần mềm là do nhân viên đã bỏ qua thao tác gì trên máy?", "Em hãy demo 1 luồng chuẩn: Bán 1 cây son thu tiền mặt -> Khách quay lại Trả hàng. Hãy chỉ cho khách thấy két tiền trên hệ thống biến động chính xác như thế nào."] }
                }
            ],
            buoi2: [
                {
                    tag: "B2-S1", biz: "Anh Minh (Cửa hàng Đồ chơi)", goal: "Mục tiêu: Phân quyền - Giá sỉ - Dịch vụ - Thêm hàng nhanh", 
                    customerVoice: "Cửa hàng tôi mới tuyển bạn nhân viên tên Vân, tôi muốn bạn ấy đứng bán hàng nhưng tuyệt đối không cho xem báo cáo doanh thu. Khách sỉ đến mua nhiều tôi thường giảm 10% nhưng cứ phải bấm máy tính tay hoài. Tiện thể, thỉnh thoảng tôi có nhận gói quà hộ khách và thu thêm 30k tiền công. Và nhiều lúc lúc đang kiểm đếm nhập hàng từ xe tải xuống, có mấy món lặt vặt như Pin AA chưa có trên hệ thống, tôi muốn thêm nhanh hàng hóa khi nhập hàng luôn chứ thoát ra vào lại danh mục lâu quá. Có cách nào làm mượt mấy việc này không?", 
                    trainerNotes: { analysis: "Học viên cần xử lý: 1. Tạo & Phân quyền nhân viên. 2. Bảng giá (Khách sỉ). 3. Hàng hóa dịch vụ. 4. Thêm hàng hóa nhanh.", hints: ["Vào đâu để phân quyền cho bạn Vân?", "Mặt hàng 'Gói quà' cài đặt sao để không bị tính tồn kho?", "Thiết lập Bảng giá Sỉ ở mục nào?", "Nút nào cho phép thêm Pin AA ngay tại phiếu nhập?"] }
                },
                {
                    tag: "B2-S2", biz: "Chị Lan (Cửa hàng Gia dụng)", goal: "Mục tiêu: Giá vốn trung bình - Đổi giá bán - Tra cứu nâng cao", 
                    customerVoice: "Lâu lâu tôi nhập hàng thì được giá ưu đãi từ NCC, ví dụ đợt trước tôi  nhập từ NCC 20 cái Chảo chống dính giá 1 triệu/cái, 2 Chảo tiếp theo có giá là 800k/cái. Khi đã nhập hàng xong, tôi muốn xem lại Phần mềm tính toán giá vốn của mặt hàng này như thế nào và có cần phải cài đặt thêm gì không?. Ngoài ra, nhiều khi đang làm phiếu nhập lô hàng Chảo chống dính này, tôi muốn tiện tay đổi luôn giá bán từ 1.5tr xuống 1.4tr thì có được không?. Lúc ra quầy bán, đôi khi tình trạng cửa hàng cũng đông khách, thu ngân muốn lọc theo nhóm hàng, thuộc tính, vị trí hoặc xem nhanh tồn kho thì cần thao tác như thế nào?", 
                    trainerNotes: { analysis: "Học viên cần xử lý: 1. Giải thích Giá vốn trung bình. 2. Thay đổi giá bán trực tiếp. 3. Tra cứu POS.", hints: ["Công thức MAC hoạt động ra sao? ([20*1tr + 2*800k] / 22).", "Ở màn hình phiếu nhập, làm sao để sửa luôn giá bán?", "Khi ở thu ngân (POS), phím tắt nào để xem tồn kho?"] }
                },
                {
                    tag: "B2-S3", biz: "Anh Hoàng (Cửa hàng Phụ tùng)", goal: "Mục tiêu: Bán nhanh MHBH - Thu nợ MHBH - Đổi trả", 
                    customerVoice: "Đang đứng ở quầy bán, khách hỏi mua cái Lốp xe chưa có trên hệ thống, tôi muốn thêm cực nhanh để in bill luôn. Khách quen ra mua sẵn tiện trả nợ cũ thì lập phiếu thu nợ khách hàng kiểu gì cho lẹ? Ác nhất là đôi khi có khách trả hàng nhưng lỡ làm mất hóa đơn gốc thì còn cách nào để giải quyết không?. Thêm nữa, tôi muốn quy định trên hệ thống chỉ cho phép trả hàng trong phạm vi 7 ngày thì hệ thống bên mình có đáp ứng được hay không?", 
                    trainerNotes: { analysis: "Học viên cần xử lý: 1. Thêm hàng MHBH. 2. Thu nợ MHBHS. 3. Trả hàng nhanh. 4. Thiết lập hệ thống (7 ngày).", hints: ["Nút thêm hàng hóa (+) trên POS nằm ở đâu?", "Làm sao thu nợ trên POS mà không cần thoát ra?", "Thao tác trả hàng nhanh khác gì hóa đơn gốc?", "Thiết lập 'Cho phép trả hàng 7 ngày' nằm ở đâu?"] }
                },
                {
                    tag: "B2-S4", biz: "Chị Hà (Cửa hàng Nội thất)", goal: "Mục tiêu: Khách VIP (Tự động) - Kiểm kho - Sổ quỹ & Ngân hàng", 
                    customerVoice: "Tôi muốn tự động hóa: Khách hàng mua đủ 5 triệu hệ thống tự cập nhật khách hàng này thuộc nhóm khách hàng VIP, với Khách hàng VIP mặc định giảm 10%, nếu trong trường hợp khách trả hàng làm doanh thu giảm xuống dưới 5 triệu thì khách sẽ bị loại khỏi nhóm này. Về hàng hóa trong kho, tôi nghi ngờ số 'Đèn ngủ' bị sai lệch nên muốn kiểm đếm lại và cân bằng kho, mình có tính năng nào có thể hỗ trợ được nghiệp vụ này của tôi không?. Cửa hàng bên tôi đa số thanh toán bằng chuyển khoản, nhưng tới cuối buổi tôi phải cộng lắt nhắt từng giao dịch để kiểm xem doanh thu tiền mặt là bao nhiêu, chuyển khoản là bao nhiêu, khá rắc rối, có cách nào để phần mềm tách được doanh thu bán hàng theo phương thức thanh toán không?. Ngoài ra, ở cửa hàng tôi có những khoản chi phát sinh, ví dụ như tiền điện hàng tháng, phần mềm có tính toán được khoản chi và ghi chép vụ này vào đâu để tính lãi ròng?", 
                    trainerNotes: { analysis: "Học viên cần xử lý: 1. Nhóm KH VIP (Tự động). 2. Kiểm kho. 3. Ngân hàng. 4. Phiếu chi (Tiền điện).", hints: ["Làm sao thiết lập điều kiện 'Tự động cập nhật'?", "Phiếu kiểm kho thao tác như thế nào?", "Khai báo số tài khoản Vietcombank ở đâu?", "Lập Phiếu chi trả tiền điện chọn loại chứng từ gì?"] }
                },
                {
                    tag: "B2-S5", biz: "Chị My (Cửa hàng Quà tặng)", goal: "Mục tiêu: ÔN TẬP LUỒNG TỔNG HỢP", 
                    customerVoice: "Tôi nhập 100 chiếc lồng đèn gỗ (gốc 50k, bán 120k). Trả trước 50% tiền, còn lại ghi nợ. Chiều có khách mua 2 cái trả tiền mặt, hôm sau mang 1 cái ra trả lại vì xước, tôi thối lại tiền. Cuối tuần tôi xuất quỹ trả nốt nợ cho xưởng. Chỉ tôi cách làm từ A-Z và mở báo cáo xem lời lỗ.", 
                    trainerNotes: { analysis: "Luồng chuẩn: Thêm mới HH -> Nhập hàng (Nợ) -> Bán hàng (Thu TM) -> Trả hàng (Hoàn TM) -> Chi thanh toán NCC -> Báo cáo.", hints: ["Làm phiếu nhập nợ 50% thao tác sao?", "Xử lý trả hàng để két tiền giảm đúng số thối cho khách?", "Trả nợ NCC vào Sổ quỹ hay Đối tác?", "Mở 3 báo cáo: Cuối ngày, Hàng hóa, Tài chính."] }
                },
                {
                    tag: "B2-S6", biz: "Anh Long (Đại lý Tạp hóa)", goal: "Mục tiêu: LUỒNG TỔNG HỢP (Quy Đổi & Thuộc Tính)", 
                    customerVoice: "Bánh Oishi nhập theo Lốc (20 gói), bán lẻ theo Gói. Có vị Tôm với Mực. Tôi nhập nợ 100% 50 Lốc bánh. Lát sau khách mua 5 gói (vị Tôm) tiền mặt, nhưng 1 tiếng sau mang 2 gói ra bắt đền vì rách. Tôi nhận lại, trả tiền. Sau đó, tôi CK thanh toán hết nợ cho xưởng. Bạn làm giúp tôi luồng này.", 
                    trainerNotes: { analysis: "Luồng: Tạo HH (Quy đổi + Thuộc tính) -> Nhập nợ 100% (Lốc) -> Bán lẻ (Gói) -> Trả hàng lẻ -> Thanh toán NCC (CK) -> Báo cáo.", hints: ["Cài đặt HH thế nào để có cơ bản, quy đổi và thuộc tính?", "Nhập 50 Lốc, giá vốn là giá 1 Lốc hay 1 Gói?", "Thanh toán nợ bằng CK thay vì Tiền mặt chọn ở đâu?"] }
                },
                {
                    tag: "B2-S7", biz: "Anh Tuấn (Shop Mẹ & Bé)", goal: "Mục tiêu: LUỒNG TỔNG HỢP (Thanh toán đa hình thức & Khách nợ)", 
                    customerVoice: "Khách mua đơn 2 triệu: quẹt thẻ 1tr, tiền mặt 500k, nợ 500k. Sáng nay bả mang 1 bộ 200k ra đổi màu nhưng kho hết, bả trả hàng, tôi phải rút tiền mặt 200k đưa lại. Tuần sau bả CK trả 500k tiền nợ. Phần mềm xử lý sao cho dòng tiền khỏi loạn?", 
                    trainerNotes: { analysis: "Luồng: Bán hàng (Thẻ + TM + Nợ) -> Trả hàng (Hoàn TM) -> Thu nợ bằng CK.", hints: ["Ghi nhận 3 hình thức thanh toán trên cùng 1 bill thế nào?", "Khách trả hàng nhận TM, phần mềm hiển thị luồng tiền ở đâu?", "Thu nợ khách hàng bằng CK chọn phương thức gì?"] }
                }
            ]
        };

        let state = { sess:1, ptr:0, names:[], logs:[], curW:"", curT:null, spinning: false };

        window.onload = () => {
            const saved = localStorage.getItem('bk_names_v75_problem');
            if(saved) {
                document.getElementById('names').value = saved;
                updateCount();
            }
        };

        function updateCount() {
            if(state.spinning) return;
            let n = document.getElementById('names').value.split('\n').filter(x=>x.trim()!=="");
            document.getElementById('c').innerText = n.length;
            state.names = n;
        }

        setInterval(updateCount, 1000);

        function setSess(n) {
            state.sess = n; 
            state.ptr = 0; // Đặt lại con trỏ kịch bản về 0 khi chuyển Tab
            document.getElementById('t1').className = n==1?'tab active':'tab';
            document.getElementById('t2').className = n==2?'tab active':'tab';
        }

        function start(mode) {
            if(state.names.length===0 && mode !== 'script') return alert("Nhập danh sách học viên!");
            state.spinning = true;
            document.getElementById('cmt').value = "";
            document.getElementById('spin').disabled = true;
            document.getElementById('actionArea').style.display = 'none';
            document.getElementById('quickBtns').style.display = 'none';

            let i = 0;
            let t = setInterval(() => {
                if(mode !== 'script') {
                    document.getElementById('winner').innerText = state.names[Math.floor(Math.random()*state.names.length)];
                }
                if(++i > 15) { clearInterval(t); finalize(mode); }
            }, 60);
        }

        function finalize(mode) {
            // Rút danh sách người chơi (Chỉ random người chơi, không đụng đến kịch bản)
            if(mode === 'full' || mode === 'user') {
                let idx = Math.floor(Math.random()*state.names.length);
                state.curW = state.names[idx];
                state.names.splice(idx, 1);
                document.getElementById('names').value = state.names.join('\n');
                document.getElementById('c').innerText = state.names.length;
            }

            // Xử lý bốc kịch bản (Fix lỗi lặp: Chạy tuần tự theo con trỏ ptr cho cả Buổi 1 và Buổi 2)
            if(mode === 'full' || mode === 'script') {
                if(state.sess == 1) {
                    state.curT = scripts.buoi1[state.ptr];
                    state.ptr = (state.ptr + 1) % scripts.buoi1.length;
                } else {
                    state.curT = scripts.buoi2[state.ptr];
                    state.ptr = (state.ptr + 1) % scripts.buoi2.length;
                }
            }

            document.getElementById('winner').innerText = state.curW;
            
            // Xử lý giao diện Popup Thẻ bài nếu lấy kịch bản mới
            if (mode === 'full' || mode === 'script') {
                // Đặt lại state cho Modal Game
                const card = document.getElementById('theGameCard');
                card.classList.remove('is-flipped');
                const btn = document.getElementById('closeGameBtn');
                btn.style.opacity = '0';
                btn.style.pointerEvents = 'none';

                document.getElementById('gameWinnerName').innerText = "HỌC VIÊN: " + state.curW;
                
                // Render vào Mặt sau của Thẻ bài
                renderScript(state.curT, 'cardBackContent');
                
                // Render vào Màn hình gốc (bị ẩn dưới lớp nền) để lát tắt popup là có sẵn
                renderScript(state.curT, 'scBox');
                
                // Hiện Modal Lật Thẻ
                document.getElementById('gameModal').style.display = 'flex';
            } else {
                // Chỉ gọi người khác, giữ nguyên đề bài cũ trên main panel
                confetti({ particleCount:100, spread:70, origin: { y: 0.6 } });
            }
            
            document.getElementById('spin').disabled = false;
            document.getElementById('actionArea').style.display = 'block';
            document.getElementById('quickBtns').style.display = 'flex';
            state.spinning = false;
        }

        // --- CÁC HÀM GAME LẬT THẺ BÀI --- //
        function flipCard() {
            const card = document.getElementById('theGameCard');
            if (!card.classList.contains('is-flipped')) {
                card.classList.add('is-flipped');
                // Nổ pháo hoa lúc thẻ lật ra (Cực ngầu)
                confetti({ particleCount: 150, spread: 100, origin: { y: 0.5 }, zIndex: 10001 });
                
                // Trì hoãn hiện nút Bắt đầu để học viên đọc xíu
                setTimeout(() => {
                    const btn = document.getElementById('closeGameBtn');
                    btn.style.opacity = '1';
                    btn.style.pointerEvents = 'auto';
                }, 800);
            }
        }

        function closeGameModal() {
            document.getElementById('gameModal').style.display = 'none';
        }
        // -------------------------------- //

        // Truyền thêm param idSuffix để tránh trùng lặp ID khi render 2 nơi (Thẻ bài và Box màn hình chính)
        function toggleTrainerNotes(id) {
            const el = document.getElementById(id);
            if(el) { el.style.display = (el.style.display === "none" || el.style.display === "") ? "block" : "none"; }
        }

        function renderScript(obj, containerId) {
            if(!obj) return;
            let contentHtml = "";

            if(obj.customerVoice) {
                let hintsHtml = obj.trainerNotes.hints.map(h => `<li>${h}</li>`).join('');
                // Tạo ID unique dựa trên containerId để popup thẻ bài & màn hình gốc không đụng nhau
                let uniqueId = `tnote_${obj.tag}_${containerId}`;
                
                contentHtml = `
                    <div class="sc-biz"><span class="sc-tag">${obj.tag}</span>${obj.biz}</div>
                    <div class="sc-goal">${obj.goal}</div>
                    
                    <div class="sc-customer-voice">
                        <b>👤 Khách hàng than phiền:</b>
                        "${obj.customerVoice}"
                    </div>

                    <button class="trainer-toggle" onclick="toggleTrainerNotes('${uniqueId}')">
                        <span>👁️ GÓC CỦA TRAINER (Nhấn để xem)</span>
                        <span>▼</span>
                    </button>
                    
                    <div id="${uniqueId}" class="trainer-notes">
                        <b>🎯 Phân tích trọng tâm:</b><br>
                        ${obj.trainerNotes.analysis}<br><br>
                        <b>💡 Câu hỏi khơi gợi (Coach):</b>
                        <ul>${hintsHtml}</ul>
                    </div>
                `;
            } 
            else {
                // Fallback cho data cũ
                let reportsHtml = "";
                if(obj.reports && obj.reports.length > 0) {
                    reportsHtml = `
                        <b style="font-size:11px; color:var(--primary); margin-top:10px; display:block">📊 BÁO CÁO CẦN XEM:</b>
                        <div class="report-grid">
                            ${obj.reports.map(r => `<div class="report-item">${r}</div>`).join('')}
                        </div>`;
                }

                contentHtml = `
                    <div class="sc-biz"><span class="sc-tag">${obj.tag}</span>${obj.biz}</div>
                    <div class="sc-goal">${obj.goal}</div>
                    <div class="sc-customer-voice" style="border-left-color: var(--danger)"><b>TÌNH HUỐNG:</b> ${obj.prob}</div>
                    <div style="margin-bottom:15px">
                        <b style="font-size:11px; color:var(--accent); text-transform:uppercase">Các bước thực hiện:</b>
                        ${obj.steps.map((step, i) => `<div class="sc-step"><b>${i+1}.</b> ${step}</div>`).join('')}
                    </div>
                    ${reportsHtml}`;
            }

            document.getElementById(containerId).innerHTML = contentHtml;
        }

        function done(res) {
            const entry = { 
                id: Date.now(), time: new Date().toLocaleTimeString('vi-VN'), 
                name: state.curW, taskObj: JSON.parse(JSON.stringify(state.curT)), 
                res: res, note: document.getElementById('cmt').value || "Không có nhận xét" 
            };
            state.logs.unshift(entry);
            renderHistory();
            document.getElementById('actionArea').style.display = 'none';
            document.getElementById('quickBtns').style.display = 'none';
            document.getElementById('winner').innerText = "XONG!";
            document.getElementById('scBox').innerHTML = '<div style="text-align:center; color:#64748b; margin-top:50px">Sẵn sàng...</div>';
        }

        function renderHistory() { 
            document.getElementById('histList').innerHTML = state.logs.map(l => `
                <div class="history-item" onclick="openModal(${l.id})">
                    <div style="display:flex; justify-content:space-between">
                        <b style="color:${l.res=='Vắng'?'#ff4757':'#00ff88'}">${l.name}</b>
                        <span style="font-size:10px; color:var(--primary); font-weight:800">${l.taskObj.tag}</span>
                    </div>
                </div>`).join(''); 
        }

        function openModal(id) {
            const item = state.logs.find(l => l.id === id);
            if(!item) return;
            document.getElementById('modalBody').innerHTML = `
                <h2 style="color:var(--primary); font-family:'Orbitron'">${item.name}</h2>
                <div style="color:#64748b; font-size:12px; margin-bottom:15px">${item.time} | Kết quả: <b style="color:${item.res=='Vắng'?'#ff4757':'#00ff88'}">${item.res}</b></div>
                <div id="modalScript"></div>
                <div style="margin-top:15px; padding:15px; background:rgba(255,255,255,0.05); border-radius:12px; border:1px solid var(--border)">
                    <b style="color:var(--accent); font-size:12px">NHẬN XÉT:</b>
                    <p style="font-size:13px; color:#cbd5e1; margin-top:5px">${item.note}</p>
                </div>`;
            renderScript(item.taskObj, 'modalScript');
            document.getElementById('historyModal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('historyModal').style.display = 'none'; }
        function toggleEditModal() { const m = document.getElementById('editModal'); if(m.style.display === 'flex') m.style.display = 'none'; else { document.getElementById('jsonEditor').value = JSON.stringify(scripts, null, 4); m.style.display = 'flex'; } }
        function updateScripts() { try { scripts = JSON.parse(document.getElementById('jsonEditor').value); alert("Thành công!"); toggleEditModal(); } catch(e) { alert("Lỗi JSON!"); } }
        
        function exportExcel() {
            if(state.logs.length === 0) return alert("Chưa có dữ liệu!");
            let csv = "\uFEFFGiờ,Học viên,Mã kịch bản,Cửa hàng,Kết quả,Nhận xét\n";
            state.logs.forEach(l => { 
                let n = l.note.replace(/(\r\n|\n|\r)/gm, " ").replace(/,/g, ";"); 
                csv += `${l.time},${l.name},${l.taskObj.tag},${l.taskObj.biz},${l.res},${n}\n`; 
            });
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = `Bao_cao.csv`; a.click();
        }

        function save() { 
            localStorage.setItem('bk_names_v75_problem', document.getElementById('names').value); 
            alert("Đã lưu danh sách học viên!"); 
        }
    </script>
</body>
</html>
